body:
  text: 卷二乾薑成聊攝云辛以潤之乾薑之辛以固陽虛之汗又云乾薑之辛以散裡寒又云寒淫所勝平以辛熱薑附之辛熱以勝寒又云乾薑之辛以溫胃散寒潔古云治沉寒痼冷腎中無陽脈氣欲絶黑附子為引用水同煎二物薑附湯是也亦治中焦有寒主治祕訣云性熱味辛氣味俱厚半浮半沉可升可降陽中陰也其用有四通心氣助陽一也去臟腑沉寒二也發散諸經之寒氣三也治感寒腹痛四也又云辛溫純陽內經云寒淫所勝以辛散之此之謂也干生薑氣溫味辛主傷寒頭痛鼻塞上氣止嘔吐咳嗽生與干同治與半夏等分以治心下急痛東垣云乾薑味苦辛溫純陽主溫中治霍亂腹冷痛除冷氣治寒嗽溫經破血去風又云主發散寒邪如多用則耗散元氣蓋辛以散之則壯火食氣故也須以生甘草緩之辛熱散內寒散陰寒肺寒與五味子同用治嗽以勝寒邪正氣虛者發寒與人參同用補脾溫胃去腹中寒甚平以辛熱也海藏云經炮則味苦溫脾燥胃所以理中其實主氣而泄脾易老云乾薑能去下焦之寒故四逆湯用之乾薑本味辛及見火後稍苦故止而不行所以能治裡寒非若附子行而不止也理中湯用此者以其四逆也或問東垣曰乾薑一味辛熱又云補脾今言泄脾而不言補何也泄之一字非泄脾之正氣是泄脾中寒濕之邪氣蓋以辛熱之劑燥之故曰泄脾也丹溪云治血虛發熱須以補陰藥同用入肺中利肺氣入腎中燥下濕入氣分引血藥以生血生薑成聊攝云薑棗味辛甘固能發散而又不特專於發散之用以脾主為胃行其津液薑棗之用專行脾之津液而和榮衛者也潔古云生薑性溫味辛甘氣味俱厚浮而升陽也其用有四製厚朴半夏毒一發散風邪二溫中去濕三益脾胃藥之佐四東垣云生薑為嘔家之聖藥辛以散之嘔為氣不散也此物能行陽而散氣又云生薑消痰下氣益脾胃散風寒主傷寒頭痛鼻寒通四肢關節開五臟六腑又云生薑與大棗同用調和脾胃辛溫與芍藥同用溫經散寒海藏云孫真人言生薑為嘔家聖藥或則東垣曰生薑辛溫入肺如何是開胃口俗指心下為胃口者非也咽門之下受有形之物系胃之系便為胃口與肺同處故入肺而開胃口也又問曰人言夜間勿食生薑食則令人閉氣何也曰生薑辛溫主開發夜則氣本收斂反食生薑開發其氣則違天道是以不宜食此以平人論之可也若有病則不然也薑屑比之乾薑不熱比之生薑不潤以乾生薑代乾薑者以其不僭也葛根成聊攝云本草云輕可去實麻黃葛根之屬是也以中風表實故加二物於桂枝湯中也潔古云治脾胃虛熱而渴解酒毒通行足陽明經主治祕訣云性寒味甘氣味俱薄體輕上行浮而微降陽中陰也其用有四止渴一也解酒二也發散表邪三也發散小兒瘡疹難出四也益陽生津不可多服恐損胃氣東垣云葛根味甘純陽止消渴身大熱解諸毒療傷寒中風頭痛解肌發表出汗開腠理又云乾葛其氣輕浮鼓舞胃氣上行生津液而解肌熱海藏云入足陽明經東垣云世或初病太陽證便服葛根升麻湯者是遺太陽不惟遺經反引太陽邪氣入於陽明不能解也朱奉議云頭痛如破者連須蔥白湯主之次又不已者葛根蔥白湯主之恐太陽流入陽明故用此以斷太陽入陽明之路而非太陽藥也故仲景治太陽陽明合病桂枝湯內加麻黃葛根也又有葛根黃芩黃連解肌湯是知葛根非太陽藥即陽明藥也易老又云太陽初病未入陽明頭痛者不可便服葛根湯發之治服之是引賊次家也若額顱痛者可服之葛根湯乃陽明自中風之仙藥也栝樓根成聊攝云栝樓根味苦微寒潤枯燥者也加之則津液通行是為渴所宜也又云津液不足而為渴苦以堅之栝樓根之苦以生津液又云苦以泄之栝樓實味苦寒通胸中鬱熱苦寒以泄熱潔古云性寒味苦陰也能解煩渴心中枯渴者非此不能除東垣云栝樓根味苦寒純陰止渴生津液苦寒與酸辛同用以導腫氣丹溪云栝樓實屬土而有水本草言治胸痹以其味甘性潤甘能補肺潤能降氣胸有痰者以肺受火逼失降下之令今得甘緩潤下之助則痰自降宜其為治嗽之要藥也又云洗滌胸膈中垢膩治消渴之神藥也苦參潔古云苦參氣寒味苦是少陰腎經之君藥也治本經須用主治祕訣云苦陰氣沉逐濕東垣云苦參能治熱毒風皮膚煩躁主瘡赤癩脫眉丹溪云苦參屬水而有火能峻補陰氣或得之而腰重者以其氣降而不升也非傷腎之謂治大風有功況風熱細疹乎當歸成聊攝云內經曰脈者血之府也諸血皆屬心通脈者必先補心益血苦先入於心當歸之苦以助心血潔古云當歸頭止血尾破血身和血若全用一破一止亦和血也使頭是一節硬實處使尾是尖細處主治祕訣云性溫味辛氣厚味薄可升可降陽中陰也其用有三心經本藥一也和血二也治諸病夜甚三也治上治外須以酒浸可以潰堅凡血受病須用之眼痛不可忍者以黃連當歸根酒浸煎服又云血壅而不流則痛當歸身辛溫以散之使氣血各有所歸東垣云當歸梢主症癖破惡血併産後惡血上衝去諸瘡瘍腫結治金瘡惡血溫中潤燥止痛又云當歸熟地黃牡丹皮此三味於諸經和血生血涼血之藥也又云血刺痛用當歸詳上下用根稍酒洗糖黃色者嚼之大辛可能潰堅治血通用甘以和血辛溫以潤內寒苦以助心散寒海藏云別説言産後惡血上衝氣血昏亂者服之即定此蓋能使氣血各有所歸恐聖人立當歸之名必因此出入手少陰以其心生血也入足太陰以其能養血也入足厥陰以其用藏血也治令用在參耆皆能補血用在牽牛大黃皆能破血佐使分定用者當知從桂附茱萸則熱從大黃芒硝則寒論諸經頭痛俱在細辛條下惟酒煎當歸治諸頭痛蓋諸頭痛皆屬肝木故以血藥主之本經云當歸主咳逆上氣當歸血藥如何治胸中氣藥性論云補女子諸不足此言盡當歸之用麻黃成聊攝云寒淫於內治以甘熱佐以苦辛以辛潤之麻黃之甘以解少陰之寒又云麻黃甘草之甘以散表寒潔古云麻黃發太陽少陰經汗入手太陰主治祕訣云性溫味甘辛氣味俱薄輕清而浮升陽也其用有四去寒邪一也肺經本藥二也發散風寒三也去皮膚寒濕及風四也泄衛中實去榮中寒又云麻黃苦為在地之陰陰當下行何謂發汗而升上經云味之薄者乃陰中之陽所以麻黃髮汗而升上亦不離乎陰之體故入手太陰也東垣云去表上之寒邪甘緩熱去節用以解少陰經之寒散表寒散浮熱又云麻黃主中風傷寒頭痛發表出汗通九竅開毛孔治咳逆上氣海藏云麻黃入足太陽手太陰能泄衛實而發汗及傷寒無汗咳嗽夫麻黃治衛實之藥桂枝治衛虛之藥桂枝麻黃雖為太陽經藥其實榮衛藥也以其在太陽地分故曰太陽也本病者即榮衛肺主衛心主榮衛為氣榮為血乃肺心所主故麻黃為手太陰之劑桂枝為手少陰之劑故傷寒傷風而咳者用麻黃桂枝即湯液之源也通草潔古云氣平味苦主小便不通導小腸中熱東垣云通草味辛甘純陽能泄肺利小便又云木通味甘而淡性平氣厚味薄陽也通經利竅去小腸之熱又云通草甘平以緩陰血燈心草潔古云氣平味甘通陰竅澀不利利小便除水腫癃閉五淋主治祕訣云辛甘陽也瀉肺丹溪云燈心草屬金火燒為灰取少許吹喉中治急喉閉甚捷白芍藥成聊攝云芍藥白補而赤瀉白收而赤散也又云芍藥之酸收斂津液而益榮又云正氣虛弱收而行之芍藥之酸以收正氣又云酸收也泄也芍藥之酸收陰氣而泄邪氣又云肺燥氣熱以酸收之以甘緩之芍藥之酸以斂逆氣潔古云白芍藥補中焦之藥炙甘草為輔治腹中痛如夏月腹痛少加黃芩惡熱而痛加黃檗若惡寒腹痛加肉桂一分白芍藥二分炙甘草一分半此仲景神品藥也如寒月大寒腹痛加桂一錢半水二盞煎一盞服主治祕訣云性寒味酸氣厚味薄升而微降陽中陰也其用有六安脾經一也治腹痛二也收胃氣三也止瀉痢四也和血脈五也固腠理六也白補赤散瀉肝補脾酒浸引經止中部腹痛去皮用東垣云芍藥味酸而苦微寒氣薄味厚陰也降也收脾經之陰氣能除腹痛酸以收之扶陽而收陰氣泄邪氣扶陰與棗生薑同用以溫經散濕通塞利腹中痛謂氣不通肺燥氣熱酸收甘緩下利必用之藥也經云肺欲收以白芍藥之酸收之海藏云衍義言芍藥全用根其品亦多須用花紅而單葉山中者為佳花葉多則根虛然其根亦多赤色其味澀若有色白粗肥者益好余如經然血虛寒人禁此一物古人有言減芍藥以避中寒誠不可忽今見花赤者為赤芍藥花白者為白芍藥俗云白補而赤瀉東垣云但澀者為上或問古今方論以澀為收今本經言利小便何謂也東垣云芍藥能停諸濕而益津液使小便自行非通利之也又腎主大小二便以此益陰滋濕故小便通也又問緩中何謂曰損其肝者緩其中即調血也又問當用何藥曰當用四物湯其內有芍藥故也赤者利小便下氣白者止痛散血入手足太陰大抵酸澀者為收斂停濕之劑故主手足太陰收降之體又能治血海而入九地之下復至厥陰也後人用赤瀉白補者以其色在西方故補在南方故瀉也丹溪云白芍藥酒浸炒與白朮同用則補脾與川芎同用補肝與人參白朮同用則補氣治腹中痛不利者必炒後重者不炒惟治血虛腹痛諸腹痛皆不可治玄參潔古云氣寒味苦治心中懊憹煩而不得眠心神顛倒欲絶血滯小便不利東垣云足少陰腎經君藥也治本經須用海藏云易老言玄參乃樞機之劑管領諸氣上下肅清而不濁風藥中多用之故活人治傷寒陽毒用玄參升麻湯治汗吐下後毒不散即知肅清樞機之劑以此論之治空以氤氳之氣無根之火以玄參為聖藥也秦艽潔古云秦艽本功外又治口噤腸風瀉血主治祕訣云性平味鹹養血榮筋中風手足不遂者用之去手陽明下牙痛及除本經風濕東垣云秦艽味苦辛陰中微陽主寒濕風痹肢節痛無問新久通攣急傳尸骨蒸知母成聊攝云上熱者以苦泄之知母黃芩之苦涼心去熱潔古云知母治足陽明大熱大補益腎水膀胱之寒主治祕訣云性寒味苦氣味俱厚沉而降陰也其用有三泄腎經之火一也作利小便之佐使二也治痢疾臍下痛三也腎經本藥苦欲上頭引經皆須用酒炒刮去皮毛用里白者佳東垣云知母味苦陰中微涼腎經海藏云東垣言入足陽明經手太陰經味苦寒潤治有汗骨蒸腎經氣勞瀉心仲景用此為白虎湯治不得眠者煩躁也煩者肺也躁者腎也以石膏為君主佐以知母之苦寒以清腎之源緩以粳米甘草之甘而使之不速下也經云胸中有寒者瓜蒂散主之又云表熱裡寒者白虎湯主之夫以瓜蒂知母味皆苦寒而治胸中之寒何也蓋成無己注云即傷寒寒邪之毒為熱病者也讀者當逆識之如論語言亂臣十人之類亂字訓作治字也仲景所言寒之一字舉其初而言之熱病在其中矣若以寒字為寒冷之寒則無復用寒苦之劑兼言白虎湯證尺寸俱長則其熱可知之矣貝母成聊攝云辛散而苦泄桔梗貝母之苦辛用以下氣海藏云寒實結胸無熱證者仲景以小陷胸湯主之白散亦可服以其內有貝母也別説云貝母能散心胸鬱結之氣殊有功今用以治心口氣不快多愁郁者信然海藏祖方下乳三母散用牡蠣知母貝母三物為細末以豬蹄調下香白芷潔古云治足陽明頭痛中風寒熱解利藥也以四味升麻湯中加之通行手足陽明經也主治祕訣云性溫味辛氣味俱輕陽也陽明行經之藥治陽明經頭痛在額及治風通用去肺經風熱頭面皮膚燥癢東垣云白芷味辛純陽治風邪止渴嘔吐頭風侵目淚出頭眩目癢治目赤努肉排膿治瘡痍疥癬長肌肉散陽明經之風又云通行手足陽明經又為手太陰之引經海藏云其氣芳香治正陽陽明頭痛與辛夷細辛同用治鼻病內托用此長肌則陽明可知也黃芩成聊攝云苦入辛而泄熱黃芩黃連之苦以泄痞熱又云陽有餘以苦除之黃連黃芩之苦以除熱潔古云治肺中濕熱療上熱目中赤腫瘀肉壅盛必用之藥泄肺中火邪上逆於膈上補膀胱之寒水不足乃滋其化源主治祕訣云性涼味苦甘氣厚味薄浮而降陽中陰也其用有九瀉肺經熱一也夏月須用二也上焦及皮膚氣熱三也去諸熱四也婦人産後養陰退陽五也利胸中氣六也消膈上痰七也除上焦熱及皮濕八也安胎九也單制二制不制分上中下也酒炒上行主上部積血非此不能除肺苦氣上逆急食苦以泄之正謂此也又治下痢膿血稠黏腹痛後重身熱久不可者與芍藥甘草同用易老又云肌熱及去痰用黃芩上焦濕熱亦用黃芩瀉肺火故也瘡痛不可忍者用苦寒藥如黃芩黃連詳上下分梢根及引經藥用之東垣云黃芩除陽有餘涼心去熱通寒格又云治發熱口苦海藏云東垣言黃芩味苦而薄中枯而飄故能泄肺火而解肌熱入手太陰經之劑也細實而中不空也治下部妙陶隱居云色深堅實者好圓者名子芩又治奔豚臍下熱痛飄與堅有高下之分與枳實枳殼同例黃芩其子主腸澼膿血其根得厚朴黃連主腹痛得五味子牡蒙牡蠣令人有子得黃耆白蘞赤小豆以療鼠瘻張仲景治傷寒心下痞滿瀉心湯四方皆用黃芩以其主諸熱利小腸故也又太陽病下之利不止有葛根黃芩黃連湯而主妊娠安胎散內多用黃芩醫亦常用千金方巴郡太守奏加減三黃丸治男子五勞七傷消渴不生肌肉婦人帶下手足寒熱者久服之行及奔馬甚驗丹溪云黃芩安胎者乃上中二焦藥降火行下也縮砂安胎者治痛行氣也若血虛而胎不安者阿膠主之治痰熱者假此以降其火也敗醬海藏云仲景治腹癰腸有膿用薏苡仁附子敗醬湯薏苡仁十分附子二分敗醬五分三物為末取方寸匕以水二升煎取一升頓服之小便當下愈時習云入手厥陰足少陰經藁本潔古云此太陽經風藥治寒氣鬱結於本經治頭疼腦痛大寒犯腦令人腦痛齒亦痛主治祕訣云味苦性微溫氣厚味薄而升陽也太陽頭痛必用之藥足太陽本經藥也頂巔痛非此不能除東垣云通行手足太陽經氣力雄壯治風通用又云治頭面及遍身皮膚風濕海藏云此與木香同治霧露之氣與白芷同作面脂藥仲景云清明以前立秋以後凡中霧露之氣皆為傷寒又云清邪中於上焦皆霧露之氣神木白朮湯內加木香藁木擇其可而用之此既治風又治濕亦各從其類也玄胡索海藏云一名玄胡索避宋諱也治心氣痛小腹痛如神入足厥陰經石香葇丹溪云香薷屬金與水而有徹上徹下之功治水甚捷肺得之則清化行而熱自下又云大葉香薷去暑利小水濃煎汁成膏丸而服之可治水脹艾葉潔古云艾葉苦陰中之陽溫胃丹溪云艾屬火而行水生寒熟溫生搗汁服可止血本草止言其溫不言其熱其性入火炙則氣下行入藥服則氣上行世人喜溫今婦人欲子者率多服之及其毒發何嘗歸咎於艾惜哉豫考圖經而默有感於其中也故云牛蒡子一名惡實潔古云主風腫毒利咽膈吞一粒可出瘡疽頭主治祕訣云辛溫潤肺散氣搗碎用之東垣云惡實味辛平甘溫主明目補中除風及皮膚風通十二經水萍丹溪云浮萍發汗尤甚麻黃地榆潔古云性寒味苦氣味俱薄體沉而降陰中陽也專治下焦血東垣云治下焦血腸風下血及瀉血下血須用之又云地榆味苦甘酸陽中微陰主婦人乳疾七傷帶下治下部膿血白薇海藏云白薇根狀似牛膝白前而短小療卒驚邪風狂痓病局方中多用治婦人以本經療傷中淋露故也海藻成聊攝云鹹味湧泄海藻咸以泄水氣潔古云海藻苦咸寒陰也治癭瘤馬刀諸瘡堅而不潰者內經云咸能軟堅營氣不從外為浮腫隨各引經之藥治之無腫不消亦泄水氣漢防己潔古云氣寒味苦療腰已下至足濕熱腫盛腳氣補膀胱去留熱通行十二經主治祕訣云辛苦陰也泄濕氣去皮淨用又云去下焦濕腫與痛並膀胱火邪必用漢防己龍膽黃檗知母也東垣云漢防己大苦寒純陰能泄血中之濕熱通血中之滯塞補陰瀉陽助秋冬瀉春夏之藥也比之於人則險而健者也險健之人幸災樂禍遇風塵之驚則借為亂階然而見善亦喜逢惡亦怒如善用之則可以敵凶暴之人突險固之地此瞑眩之藥聖人所以存而不廢爾今夫防己聞其臭則可惡下咽則令人身心為之煩亂飲食為之減少至於十二經有濕熱壅塞不通及治下疰腳氣除膀胱積熱而庇其基本非此藥不可真行經之仙藥無可代之者復有不可用者數端若遇飲食勞倦陰虛生內熱元氣穀氣已虧之病而以防己泄大便則重亡其血此不可用一也如人大渴引飲是熱在上焦肺經氣分宜滲泄之其防己乃下焦血藥此不可用二如外傷風寒邪傳肺經氣分濕熱而小便黃赤乃至不通此上焦氣病禁用血藥此不可用三也若人久病津液不行上焦虛渴宜補以人參葛根之甘溫若用苦寒之劑則速危此不可用四也不止如此但上焦濕熱者真不可用若下焦有濕熱流入十二經以致二陰不通然後可審而用之也又云太陽本經藥也天麻潔古云治風痰眩運頭痛高良薑潔古云氣熱味辛純陽健脾胃東垣云良薑味辛大溫純陽主胃中冷逆霍亂腹痛健脾胃茴香潔古云茴香破一切臭氣調中止嘔下食東垣云補命門不足之藥海藏云茴香本是治膀胱藥以其先丙故云小腸也能潤丙燥以其先戊故從丙至壬入手足少陰二藥相合以開上下經之通道所以丙與壬交也手足太陽藥紅藍花潔古云破留血神驗入心養血謂其苦溫為陰中之陽故入心東垣云紅花和血與當歸同用丹溪云破留血養心血多用則破血少用則養血牡丹皮潔古云治腸胃積血及衄血吐血必用之藥是犀角地黃湯中一味也主治祕訣云辛苦陰中陽也涼骨熱東垣云牡丹皮辛味苦寒陰中之陽主除症堅瘀血留舍腸胃婦人冷熱血氣排膿通經涼骨蒸又云去腸胃中留血滯血於諸經皆能和血生血涼血海藏云易老言治神志不足神不足者手少陰也志不足者足少陰也故仲景八味丸用之牝牡乃天地之稱牡為群花之首葉為陽發生花為陰成實丹為赤即火故能瀉陰中之火牡丹皮主手厥陰足少陰無汗之骨蒸地骨皮主足少陰手少陽有汗之骨蒸又云牡丹皮治胞中之火京三稜潔古云氣平味苦陰中陽也破積氣損真氣虛人勿用火炮製使東垣云京三稜味苦平陰中微陽治癥瘕癖積結塊脹滿治氣脹海藏云其色白破血中之氣又云京三稜逢莪朮治瘡堅硬甚者用之為堅者削之也青黛丹溪云青黛能收五臟之鬱火解熱毒瀉肝消食積鬱金潔古云鬱金味辛苦純陰涼心經東垣云鬱金主積血下氣主肌止血破惡血治陽毒入胃下血頻痛丹溪云上行之藥也肉豆蔻海藏云入手陽明經丹溪云肉豆蔻屬金與土溫中補脾有功日華子言其下氣蓋以脾得補而善運化其氣自下非若香附陳皮之快泄也衍義不詳其實謾爾因此遂為不可多服天南星東垣云南星味甘辛陰中之陽主中風降痰麻痹下氣破堅積消癰腫利胸膈散血墮胎乃肺經之本藥縮砂蜜潔古云治脾胃氣結滯不散主虛勞冷瀉心腹痛下氣消食海藏云縮砂與檀香白豆蔻為使則入肺與人參益智為使則入脾與黃檗茯苓為使則入腎與赤白石脂為使則入大小腸入手足太陰手足陽明經丹溪云縮砂安胎止痛行氣故也蓬莪朮海藏云蓬莪朮其色黑破氣中之血入氣藥中發諸香雖為泄劑亦能益氣故孫用和治氣短不能續所以大小七香丸集香丸散及湯中多用此也香附子潔古云味甘苦微寒氣厚於味陽中陰也快氣東垣云香附子味甘微寒除胸中熱充皮毛治一切氣並霍亂吐瀉腹痛腎氣膀胱冷消食下氣海藏云後世人用治崩漏本草不言治崩漏圖經云膀胱間連脅下時有氣妨皮膚瘙癢癮疹飲食不多日漸瘦損常有憂愁心忪少氣以是知益氣血之藥也方中用治崩漏是益氣而止血也又能逐去凝血是推陳也與巴豆能治泄瀉不止又能治大便不通同意丹溪云香附子必用童便浸凡血藥必用之以引至氣分而生血此陽生陰長之義也紅豆蔻海藏云是高良薑子也畏良薑用紅豆復用良薑如用官桂復用桂花同意白豆蔻潔古云蕩散肺中滯氣寬膈進飲食主治祕訣云性熱味辛氣味俱薄輕清而升陽也其用有五肺經本藥一也散胸中滯氣二也感寒腹痛三也溫暖脾胃四也赤眼暴發白睛紅者用之少許五也東垣云白豆蔻味辛大溫純陽主積冷氣止嘔逆翻胃消穀下氣去太陽經目內大眥紅筋海藏云入手太陰經別有清高之氣上焦元氣不足以此補之黑附子成聊攝云附子之辛溫固陽氣而補胃又云濕在經者逐以附子之辛熱又曰辛以散之附子之辛以散寒潔古云黑附子其性走而不守亦能除胸中寒甚以白朮為佐謂之朮附湯除寒濕之聖藥也治濕藥中宜少加之通行諸經引用藥也及治經閉主治祕訣云性大熱味辛甘氣厚味薄輕重得宜可升可降陽也其用有三去臟腑沉寒一也補助陽氣不足二也溫暖脾胃三也然不可多用慢火炮製去皮臍用又云附子熱氣之厚者乃陽中之陽故經云發熱又云非附子不能補下焦之陽虛東垣云黑附子味辛甘溫大熱純陽治脾中大寒主風寒咳逆溫中又云散臟腑沉寒其氣亦寒補諸不足不宜多用經曰壯火食氣故也用之則須以甘草緩之辛熱以溫少陰經以溫陽氣散寒發陰必以辛熱濕淫所勝腹中痛用之補虛勝寒蛔動胃虛則氣壅滿甘令人中滿去朮加此補陽散壅海藏云附子入手少陽足少陰三焦命門之劑其浮中有沉無所不至味辛大熱為陽中之陽故行而不止非若乾薑止而不行也非身表涼四肢厥者不可僭用如用之者以其治四逆也丹溪云衍義論附子有五等同為一物以其形象命名而為用至哉言矣然猶有未明也仲景八味丸以附子為少陰之嚮導其補自是地黃為主後世因以附子為補藥誤矣附子之性走而不守但取其健悍走下之性以行地黃之滯可致遠爾烏頭天雄皆氣壯形偉可為下部藥之佐惜無表其害人之禍者相習用之為治風之藥殺人多矣如治風治寒有必須用附子烏頭者當以童便而浸之以殺其毒且可以助行下之力入鹽尤捷也烏頭潔古云治風痹血痹寒痹半身不遂行經藥也主治祕訣云性熱味辛甘氣厚味薄浮而升陽也其用有六除寒疾一也去心下痞堅二也溫養臟腑三也治諸風四也破積聚滯氣五也感寒腹痛六也東垣云烏頭味辛甘溫大熱純陽主中風除寒濕痹行經散風邪不宜多用海藏云烏附子類皆水浸炮裂去皮臍用之然多外黃內白劣性尚存些少莫若乘熱切作片子再炒令表裡皆黃色劣性盡去為良也今人罕知如此制之天雄潔古云非天雄不能補上焦之陽虛白附子東垣云味辛甘微溫純陽主血痹行藥勢治中風失音半夏成聊攝云辛者散也半夏之辛以散逆氣以除煩嘔辛入肺而散氣辛以散結氣辛以發音聲潔古云半夏治寒痰及形寒飲冷傷肺而咳大和胃氣除胃寒進飲食治太陰痰厥頭痛非此不能除主治祕訣云性涼味辛苦氣味俱薄沉而降陰中陽也其用有四燥脾胃濕一也化痰二也益脾胃之氣三也消腫散結四也渴則忌之又云去痰用半夏熱痰加黃芩風痰加南星胸中寒痰痞塞用陳皮白朮然多用則瀉脾胃東垣云半夏主中風除痰生溫熟寒健脾胃止嘔吐去胸中痰滿又云渴者禁半夏丹溪云半夏屬金與土仲景用於小柴胡取其補陽明也豈非有燥脾土之功歟大黃成聊攝云大黃謂之將軍以苦蕩滌又云宜下必以苦大黃之苦寒以下瘀熱又云腸燥胃強以苦泄之大黃枳實之苦下燥結而泄胃強也潔古云大黃之性走而不守瀉諸實熱大腸不通蕩滌腸胃間熱專治不大便主治祕訣云性寒味苦氣味俱厚沉而降陰也其用有四去濕熱一也除下焦濕二也推陳致新三也消宿食四也用之酒浸煨熟寒因熱用也又云味苦純陰熱淫所勝以苦泄之酒浸入太陽經酒洗入陽明經余經不用酒又云腹中實熱者用大黃芒硝又云大黃苦味之厚者乃陰中之陰故經云泄下海藏云味苦寒陰中之陰也下泄推陳致新去陳垢而安五臟謂如戡定禍亂以致太平無異所以有將軍之名入手足陽明經以酒引之上至高巔以舟楫載之可浮胸中本苦泄之性峻至於下以酒將之可至至高之分若物在高巔人迹不及之處必射以取之也故太陽陽明正陽陽明承氣湯俱用酒浸惟少陽陽明為下經故小承氣湯不用酒浸也襟證方有生用者有用麵裹蒸熟者其制不一衍義云仲景治心氣不足吐血衄血瀉心湯用大黃黃芩黃連或曰心氣不足矣而不用補心湯更用瀉心湯何也答曰心氣獨不足則不當吐衄也此乃邪熱因不足以客之故吐衄以苦泄其熱就以苦補其心蓋兩全之有此證者用之無不效量虛實而用之丹溪云大黃屬水與火苦寒而善泄仲景用之以治心氣不足而衄血者名曰瀉心湯正是因少陰經之陰氣不足本經之陽氣亢甚無所輔著以致陰血妄行而飛越故用大黃泄去亢甚之火使之和平則血歸經而自安矣夫心之陰氣不足非一日矣肺與肝俱各受火而病作故以黃芩救肺黃連救肝蓋肺者陰之主肝者心之母血之舍也肺肝之火既退陰血自復其舊矣衍義不與明説而曰熱因不足而客之何以明仲景之意開後人之盲聵乎葶藶成聊攝云葶藶杏仁之苦甘所以泄滿東垣云葶藶苦寒熬與辛酸同用以導腫氣海藏云葶藶仲景用苦者余方或有用甜者或有不言甜苦者大抵苦則下泄甜則少緩量病虛實用之不可不審本草雖云甜苦主治同然甜苦之味安得不異仲景葶藶大棗瀉肺湯用之丹溪云葶藶屬火與水性急善逐水病人稍虛者宜遠之其殺人甚速何待久服而後致虛也桔梗成聊攝云辛散而苦泄桔梗貝母之苦辛用以下氣又云桔梗辛溫以散寒潔古云桔梗治咽喉痛利胸中氣主治祕訣云味辛苦微溫味厚氣薄陽中陰也肺經之引藥辛苦微溫乃散寒嘔若咽中痛非此不能除陽中之陽謂之舟楫諸藥中有此一味不能下沉治鼻塞去蘆米泔浸一宿焙乾用東垣云桔梗性涼味甘苦味厚氣薄浮而升陽也其用有五利胸膈咽喉氣壅及痛一也破滯氣及積塊二也肺部風熱二也清利頭目四也利竅五也海藏云入手太陰足少陽經易老言桔梗與國老並行同為舟楫之劑如用將軍苦泄峻下之藥欲引至胸中至高之分成功非此辛甘不居譬如鐵石入江非舟楫不載故用辛甘之劑以升之也衍義云治肺熱氣奔促咳逆肺癰排膿丹溪云桔梗能開提氣血氣藥中宜兼用之旋覆花成聊攝云硬則氣堅鹹味可以軟之旋覆之咸以軟痞硬海藏云發汗吐下後心下痞堅噫氣不除者宜此仲景治傷寒汗下後心下痞堅噫氣不除旋覆代儲湯胡洽治痰飲兩肋脹滿旋覆花丸用之尤妙射干射音夜潔古云射干苦陽中陰也去胃中癰瘡東垣云射干味苦平陽中之陰主咳逆上氣喉痹咽痛消腫毒通女人月經消瘀血海藏云仲景治咽中動氣或閉塞鳥扇湯中用之時習云仲景射干湯用之鳥扇是射干苗也丹溪云射干屬金而有木與水火行厥陰太陰之積痰使結核自消甚捷又曰治便毒此乃足厥陰濕氣因疲勞而發取射干三寸與生薑同煎食前服利三兩行效又治喉痛切一片噙之效紫花者是紅花者非恆山丹溪云恆山屬金而有火與水性暴悍善驅逐能傷真氣功不掩過者也病者稍近虛怯勿用也雷公有云老人與久病人切忌之蜀漆潔古云蜀漆味辛純陽破血東垣云蜀漆破腹中癰瘕堅結痞氣積聚邪氣主瘴鬼久瘧不瘥又云蜀漆洗去腥與苦酒同用以導膽海藏云火邪錯逆加蜀漆之辛以散之甘遂潔古云味甘寒有毒水結胸中非此不能除之東垣云甘遂味苦寒純陽主大腹腫滿能瀉十二種水氣腫滿海藏云甘遂可以通水以其氣直達透所結處白及與白蘞同潔古云白及苦甘陽中陰也止肺血澀與白蘞同東垣云白及味苦辛甘陽中陰也主癰腫惡瘡敗疽發背瘰癧腸風痔漏湯火瘡大戟成聊攝云苦以泄之甘遂大戟之苦以泄水水者腎所生也潔古云大戟味苦甘寒陰中微陽也瀉肺氣卻能損真氣海藏云此澤漆根也與甘遂同為泄水之藥濕勝者以苦燥除之蕘花成聊攝云蕘花下十二種水水去利則止海藏云張仲景以蕘花治利者以其行水也水去利則止其意如此若用時當以意斟酌不可使過與不及也仍須是有此證者方可用之仲景小青龍湯若微利去麻黃加蕘花如雞子大熬令赤色用之蓋利水也威靈仙東垣云威靈仙味苦純陽主諸風濕冷宣通五臟去腹內癖滯腰膝冷痛及折傷丹溪云屬金與木其性好走治痛風之要藥也在上痛者尤效須量病人稍虛者即禁用之牽牛子東垣云牽牛子非神農之藥也本草名醫續注云味苦寒能除濕利小水治下疰腳氣據所説氣味主治俱誤矣何以明之凡藥中用牽牛子者少則動大便多則下水此乃下氣之藥試取嘗之即得辛辣味久而嚼之猛烈雄壯漸漸不絶非辛如何續注家乃謂味苦寒其苦寒果安在哉若以為瀉濕之藥猶不知其的也何則此物但能瀉氣中之濕熱不能瀉血中之濕熱況濕從下受之下焦主血是血中之濕宜用苦寒之味今反以辛藥瀉之其傷人必矣夫濕者水之別稱有形者也若肺先受濕則宜用之今用藥者不問有濕無濕但傷食或欲動大便或有熱服或作常服克化之藥俱用牽牛豈不誤哉殊不知牽牛辛熱瀉人元氣比之諸辛藥瀉氣尤甚以其辛之雄烈故也經云辛瀉氣辛走氣辛瀉肺氣病者無多食辛此一味瀉人元氣至甚神速況飲食失節勞役所傷是胃氣不行心火乘之腸胃受火邪名曰熱中脈經云脾胃主血所生病當血中瀉火潤燥補血破惡血瀉胃之濕熱及胸中熱肺受火邪當以黃芩之苦寒瀉火以當歸之辛溫和血以生地黃之苦寒涼血補血少加紅花之辛溫以瀉血絡以桃仁之辛甘油膩之藥以破惡血兼除燥潤大便然猶不可專用須於正藥補中益氣湯黃耆人參甘草諸甘溫甘寒補元氣瀉陰火之藥內兼而用之何則上焦元氣已自虛弱若反用牽牛大辛辣氣味俱陽之藥以瀉水瀉元氣可乎津液已不足口燥舌乾而重瀉其津液利其小便重瀉已虛之元氣復竭其津液致陰火愈甚可乎故重則必死輕則夭人壽誠可憫也今重為備言之牽牛感南方熱火之化所生者也血熱而瀉氣差誤甚矣若病濕勝濕氣不行施化致大小便不通則宜用之耳濕去則氣得周流所謂五臟有邪更相平也經云一臟不平以所勝平之火能平金而瀉肺氣者即此也近世錢氏瀉黃散中獨用防風比之餘藥過於兩倍者以防風辛溫令於上中以瀉金來助濕者也經云從前來者為實邪謂子能令母實實則瀉其子此之謂以所勝乎子者也古人有云牽牛不可耽嗜耽嗜則脫人元氣經云秋不食薑令人瀉氣故夏月食薑不禁為熱氣正旺之時夏宜以汗散火令其汗出以越其熱故秋月則禁之朱晦庵語録中有戒秋食薑則夭人天年經止言辛瀉氣而晦庵戒之深者也薑尚之如此況牽牛乎今所以言此者明味辛之物皆有宜禁之時亦猶牽牛不可一概用之也張仲景治七種濕證小便不利無一藥中有犯牽牛者仲景豈不知牽牛能泄濕利小便也為濕病之根在下焦是血分中氣病不可用辛辣氣藥瀉上焦太陰之氣故七種濕證藥無一用之者仲景尚不敢輕用牽牛如此世醫乃一概用之何也又云白牽牛瀉氣分濕熱上攻喘滿海藏云以氣藥引之則入氣以大黃引之則入血張文懿公云不可耽嗜脫人元氣吾初亦疑之藥有何耽嗜後每見人因酒食病痞者多服食藥以導其氣及用神芎犯牽牛等丸初服則快藥過其痞依然依前再服隨藥而效藥過服病由是愈信其效以此久服脫人元氣而猶不知悔悟也治法惟當益脾健胃使人元氣生而自然腐熟水穀此法無以加矣丹溪云牽牛性善走屬火有黑白兩種黑者屬水白者屬金若非病形與脈證俱實者勿用也不脹滿不大小便俱祕者勿用也如稍涉疑似誤用其驅逐以致虛先哲之所深戒也萆麻子丹溪云萆麻子屬陰而能吸出有形質之滯物故取胎産胞衣剩骨膿血者用之其葉主腳上腫瘡苧根丹溪云苧根屬水而有土與金大能補陰而行滯血方藥中鮮用故表而出之安胎尤效羊蹄根丹溪云羊蹄根屬水走血分葉似苦蕒甘而不苦馬鞭草丹溪云馬鞭草治金瘡行血活血白頭翁東垣云白頭翁味苦性寒主下焦腎虛純苦以堅之海藏云仲景治熱利下重者白頭翁湯主之內經云腎欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之蘆根海藏云金匱玉函方治五膈氣滯煩悶吐逆不下食蘆根五兩銼水三大盞者取二錢去滓溫服無食馬兜鈴潔古云苦寒陰中陽也主肺熱清肺氣補肺東垣云馬兜鈴味苦寒陰中之陽主肺熱咳嗽痰結喘促連翹潔古云連翹性涼微苦氣味俱薄輕清而浮升陽也其用有三瀉心經客熱一也去上焦諸熱二也瘡瘍須用三也東垣云連翹十二經瘡藥中不可無乃結者散之之義能散諸經血結氣聚此瘡瘍之神藥也又云諸經客熱非此不能除海藏云入手足少陽經治瘡瘍瘤氣癭起結核有神與柴胡同功須分氣血之異爾與鼠黏子同用治瘡瘍別有神效連軺海藏云苦寒除熱本經不見所載但仲景方內注云連軺即連翹之根也木賊丹溪云用木賊發汗至易須去節銼以水潤濕布火烘用夏枯草丹溪云夏枯草無臭味治瘰癧郁臭草有臭味方作緊而藥即充尉是也明是兩物俱生於春但夏枯草先枯而無子郁臭草後枯而結黑子又云有補養厥陰血脈之功三月四月開花五月夏至時候便枯蓋凜純陽之氣得陰氣則枯也佛耳草東垣云佛耳草酸熱治寒嗽及痰涎除肺中寒大升肺氣少用款冬花為使過食則損目燈籠草丹溪云燈籠草寒治熱痰嗽佛耳草治寒嗽款冬花東垣云味辛甘純陽溫肺止嗽治肺痞勞嗽消渴喘急蜀葵花潔古云性冷陰中之陽赤者治赤帶白者治白帶赤治血燥自治氣燥蘭葉東垣云蘭葉味辛平其氣清香生津止渴益氣潤肌肉內經云消渴治之以蘭是也消渴證非此不能除膽疸必用丹溪云蘭稟金水之清氣而似有火人知其花香之可貴而不知為用之方蓋其葉能散久積陳爵之氣甚有力入藥煎者用之東垣方中常用矣蒲公草丹溪云蒲公英屬土開黃花似菊花而小折斷有白汁莖中空虛化熱毒消惡腫結核有奇功在處田間路側有之二月開黃花似菊味甘解食毒散滯氣可入陽明太陰經洗淨細銼同忍冬藤煎濃湯入少酒佐之以治乳癰服罷隨手欲睡是其功也睡覺病已安矣東垣云微苦寒足少陰腎經君藥治本經須用漏蘆東垣云足陽明本經藥白蘞東垣云味苦甘主癰腫瘡疽塗一切腫毒傅丁瘡火灼瘡治發背薑黃東垣云味辛大寒無毒治癥瘕血塊癰腫通月經消腫毒葫蘆巴東垣云味苦純陽治元藏虛寒腎經虛冷膀胱疝氣茜根潔古云味苦寒陰中之陽去諸死血萎蕤東垣云甘平潤肺除熱商陸根東垣云熬辛酸與苦同用以導腫氣御米殼即罌粟殼潔古云味酸澀主收固氣昆布東垣云味大咸治瘡之堅硬者咸能軟堅也
