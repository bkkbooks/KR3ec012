body:
  text: 卷四經曰味為陰味厚為純陰味薄為陰中之陽氣為陽氣厚為純陽氣薄為陽中之陰味厚則泄味薄則通氣厚則發熱氣薄則發泄辛甘發散為陽酸苦湧泄為陰淡味滲泄為陽鹹味湧泄為陰升降者天地之氣交茯苓淡為在天之陽也陽當上行何謂利水而泄下經云氣之薄者乃陽中之陰所以茯苓利水而泄下然而泄下亦不離乎陽之體故入手太陽也麻黃苦為在地之陰也陰當下行何謂發汗而升上經云味之薄者乃陰中之陽所以麻黃髮汗而升上然而升上亦不離乎陰之體故入手大陰也附子氣之厚者乃陽中之陽故經云發熱大黃味之厚者乃陰中之陰故經云泄下粥淡為陽中之陰所以利小便茶苦為陰中之陽所以清頭目清陽發腠理清之清者也清陽實四肢清之濁者也濁陰歸六腑濁之濁者也濁陰走五臟濁之清者也藥性要旨苦藥平升微寒平亦升甘辛藥平降甘寒瀉火苦寒瀉濕熱苦甘寒瀉血熱用藥升降浮沉補瀉法肝膽味辛補酸瀉氣溫補涼瀉注云肝膽之經前後寒熱不同逆順互換入求責法心小腸味鹹補甘瀉氣熱補寒瀉三焦命門補瀉同脾胃味甘補苦瀉氣溫熱補寒涼瀉注云溫涼寒熱各從其逆順互換入求責法肺大腸味酸補辛瀉氣涼補溫瀉腎膀胱味苦補咸瀉氣寒補熱瀉五臟更相平也一臟不平所勝平之此之謂也故云安穀則昌絶谷則亡水去則榮散谷消則衛亡榮散衛亡神無所居又仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不溫血溫衛和榮衛將行常有天命藏氣法時補瀉法肝苦急急食甘以緩之甘草心苦緩急食酸以收之五味子脾苦濕急食苦以燥之白朮肺苦氣上逆急食苦以瀉之黃芩腎苦燥急食辛以潤之知母黃檗注云開腠理致津液通氣也肝欲散急食辛以散之川芎以辛補之細辛以酸瀉之白芍藥心欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之黃耆甘草人參脾欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連肺欲收急食酸以收之白芍藥以酸補之五味子以辛瀉之桑白皮腎欲堅急食苦以堅之知母以苦補之黃檗以咸瀉之澤瀉注云此五者有酸辛甘苦咸各有所利或散或收或緩或軟或堅四時五臟病隨五味所宜也治法綱要氣交變論云五運太過不及夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化收藏之理氣之常也失常則天地四塞矣注云失常之理則天地四時之氣無所運行故動必有靜勝必有復乃天地陰陽之道也以熱治熱法經云病氣熱甚而與寒藥交爭而寒藥難下故反熱服順其病勢熱體既去寒性乃發病勢除愈則如承氣湯寒藥反熱服之者是也寒病亦同法也凡治病者必求其所在病在上者治上病在下者治下故中外臟腑經絡皆然病氣熱則除其熱病氣寒則除其寒六氣同法瀉實補虛除邪養正平則守常醫之道也太法曰前人方法即當時對證之藥也後人用之當體指下脈氣從而加減否則不效豫非鄙乎前人而自用也蓋五行相制相兼生化制承之體一時之間變亂無常驗脈處方亦前人之法也而復有通乎理當以豫言為然用藥用方辨如仲景治表虛制桂枝湯方桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草佐之如陽脈澀陰脈弦法當腹中急痛乃制小建中湯方芍藥為君官桂甘草佐之一則治其表虛一財治其裡虛是各言其主用也後人之用古方者觸類而長之則知其本而不致差誤矣去臟腑之火黃連瀉心火梔子黃芩瀉肺火白芍藥瀉肝火知母瀉腎經火木通瀉小腸火黃苓瀉大腸火石膏瀉胃經火柴胡瀉三焦火黃芩佐之柴胡瀉肝經火黃連佐之膽經亦同黃檗瀉膀胱火又曰龍火膀胱乃水府之火故曰龍火也以上諸藥瀉各經之火不惟止能如此更有治病合為君臣處詳其宜而用之不可執而言也各經引用太陽經羌活在下者黃檗小腸膀胱也少陽經柴胡在下者青皮膽三焦也陽明經升麻白芒在下者石膏胃大腸也太陰經足脾白芍藥手肺桔梗也少陰經足腎知母手心黃連獨活也厥陰經青皮在上者柴胡肝心包絡也同少陽已上十二經之的藥也五味所用苦以瀉之甘以發之及緩之詳其所宜用之酸以收之辛以散之咸以軟之淡以滲泄之用藥各定分兩為君者最多為臣者次之為佐使者又次之藥之於證所主停者則各等分也藥性生熟用法黃連黃芩知母黃檗治病在頭面及手梢皮膚者須酒炒之藉酒力上升也治在咽之下臍之上者須酒浸之治在下者生用凡熟升生降也大黃鬚煨恐寒傷胃氣至於烏頭附子須炮去其毒也用上焦藥須酒浸曝乾黃檗知母治下部之藥也久弱之人須合之者酒浸曝恐寒傷胃氣也熟地黃酒浸亦然當歸酒浸助發散之用也藥用根梢法凡根之在上者中半已上氣脈上行以生苗者為根中半以下氣脈下行以入土者為梢當知病在中焦用身上焦用根下焦用梢經云根升梢降醫學啓源天地六位臟象之圖手足三陰三陽注云肝心脾肺腎皆屬陰五臟也膽胃三焦膀胱大腸小腸皆屬陽六腑也分而言之手足皆有三陰三陽是也手三陰三陽三焦寅相火手少陽大腸卯燥金手陽明小腸辰寒水手太陽包絡巳風木手厥陰心午君火手少陰肺未濕土手太陰足三陰三陽膽申相火足少陽胃酉燥金足陽明膀胱戌寒水足太陽肝亥風木足厥陰腎子君火足少陰脾醜濕土足大陰歌曰手經太陽屬小腸膀胱經屬足太陽肝足厥陰手包絡胃足陽明手大腸膽屬少陽足經尋三焦手內少陽臨腎足少陰手是心脾足太陰手肺金五臟六腑除心包絡十一經脈證法天人有五臟六腑虛實寒熱生死逆順皆見形證脈氣若非診察無由識也虛則補之實則瀉之寒則溫之熱則涼之不虛不實以經調之此乃良醫之大法也隨證治病藥品頭痛須川芎如不愈加引經藥太陽川芎陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸頂巔痛用藁本去川芎肢節痛用羌活風濕亦用之少腹痛用青皮心下痞必用枳實黃連腹痛用芍藥惡寒而痛加桂惡熱而痛加黃檗腹中窄狹用蒼朮肌熱及去痰用黃芩亦用黃耆腹脹用薑製厚朴腹中實熱用大黃芒硝虛熱用黃耆亦止虛汗脅下痛往來寒熱日晡潮熱用柴胡脾胃受濕沉困無力怠惰嗜臥及去痰用白朮胃脘痛用草豆蔻氣刺痛用枳殼看經分以導引之破滯氣用枳殼高者用之然能損胸中至高之氣三二服則已破滯血用桃仁蘇木補血不足用甘草和血用當歸凡血受病皆用血刺痛用當歸詳上下用根梢去痰用半夏熱痰用黃芩風痰加南星胸中寒痰痞塞用陳皮白朮然多用則瀉脾胃調氣用木香補氣用人參去下焦濕腫及痛並膀胱有火邪必用火洗漢防己草龍膽黃柏知母去上焦濕及熱須用黃芩瀉肺火故也去中焦濕熱與痛用黃連瀉心火故也去滯氣用青皮多則泄元氣渴者用乾葛茯苓禁半夏嗽用五味子喘則用阿膠宿食不消用黃連枳實煩躁用梔子仁飲食多以致傷脾用白朮茯苓芍藥瘡痛不可忍者用苦寒藥如黃芩黃連詳上下分根梢及引經藥眼痛不可忍者用黃連當歸根以酒浸煎小便黃用黃檗澀者加澤瀉莖中痛用生甘草梢驚悸恍惚用茯神凡用純寒熱藥必用甘草以緩其方也寒熱相雜亦用甘草調和其性也中滿者禁用經云中滿勿食甘五臟補瀉法肝虛以陳皮生薑之類補之經曰虛則補其母水能生木腎乃肝之母腎水也若補其腎熟地黃黃檗是也如無他證惟不足錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心心虛則炒鹽補之虛則補其母木能生火肝乃心之母肝木也心火也以生薑補肝如無他證錢氏安神丸是也實則甘草瀉之如無他證以錢氏方中重則瀉心湯輕則導赤散脾虛則甘草大棗之類補之實則以枳實瀉之如無他證虛則以錢氏益黃散實則瀉黃散心乃脾之母以鹽炒補心肺乃脾之子以桑白皮瀉肺肺虛則五味子補之實則桑白皮瀉之如無他證實則用錢氏瀉白散虛則用阿膠散虛則以甘草補脾土補其母也實則以澤瀉瀉腎水瀉其子也腎虛則熟地黃黃檗補之瀉以澤瀉之咸腎本無實本不可瀉錢氏有補腎地黃丸無瀉腎之藥肺乃腎之母金生水故也以五味子補肺而已已上五臟內經藏氣法時論中備言之欲究其詳請看本論臟腑相生相剋肺為金肝為木腎為水心為火脾為土生我者為父母我生者為子孫克我者為鬼賊我克者為妻財木生火火生土土生金金生水水生木木剋土土剋水水剋火火剋金金剋木假令木生火木乃火之父母火乃木之子孫木剋土木乃土之夫土乃木之妻余皆仿此七神心藏神肺藏魄肝藏魂脾藏意與智腎藏精與志制方之法夫藥有寒熱溫涼之性有酸苦辛鹹甘淡之味各有所能不可不通也夫藥之氣味不必同同氣之物其味俱咸其氣皆寒之類是也凡同氣之物必有諸味同味之物必有諸氣互相氣味各有厚薄性用不等制方者必且明其用矣經曰味為陰味厚為純陰味薄為陰中之陽氣為陽氣厚為純陽氣薄為陽中之陰然味厚則泄味薄則通氣厚則發熱氣薄則發泄又曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽凡此之味各有所能然辛能散結潤燥苦能燥濕堅軟咸能軟堅酸能收緩收散甘能緩急淡能利竅故經曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之開腠理致津液通氣也肝欲散急食辛以散之以辛補之以酸泄之心欲軟急食鹹以軟之以咸補之以甘瀉之脾欲緩急食甘以緩之以甘補之以苦泄之肺欲收急食酸以收之以酸補之以辛瀉之腎欲堅急食苦以堅之以苦補之以咸瀉之凡此者是明其氣味之用也若用其味必明其味之可否若用其氣必明其氣之所宜識其病之標本臟腑寒熱虛實微甚緩急而用其藥之氣味隨其證而制其方也是故方有君臣佐使輕重緩急大小反正逆從之制也主治病者為君使君者為臣應臣者為使此隨病之所宜而又贊成方而用之君一臣二奇之制也君二臣四耦之制也君二臣三奇之制也君四臣六耦之制也去咽嗌之病者近者奇之治腎肝之病者遠者耦之汗者不可以奇下者不可以耦補上治上制以緩緩則氣味補薄下治下制以急急則味氣厚薄者則頻而少服厚者則頓而多服又當明五氣之郁木鬱則達之謂吐令條達也火鬱則發之謂汗令疏散也土鬱則奪之謂下令無壅滯也金鬱則泄之謂解表利小便也水鬱則折之謂制其沖逆也凡此五者治病之大要也㕮咀之藥古之用藥治病擇淨口嚼水煮服之謂之㕮咀後人乃以鍘細銼桶內銼過以竹篩齊之也五行制方生克法附湯例風製法肝春木酸生之道也失常則病矣風淫於內治以辛涼佐以苦辛以甘緩之以辛散之暑製法心夏火苦長之道也失常則病矣熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕製法脾土甘中方化成之道也失常則病矣濕淫於內治以苦熱佐以咸熱以苦燥之以淡泄之燥製法肺秋金辛收之道也失常則病矣燥淫於內治以苦溫佐以甘辛以辛潤之以苦下之寒製法腎冬水咸藏之道也失常則病矣寒淫於內治以甘熱佐以苦辛以辛散之以苦堅之注云酸苦甘辛鹹即肝木心火脾土肺金腎水之本也四時之變五行化生各順其道違則病生聖人設法以制其變謂如風淫於內即是肝木失常火隨而熾治以辛涼是以辛金克其木涼水沃其火其下治法例皆如此下項二方非為治病而設此乃教人比證立方之道容易通曉也當歸拈痛湯治濕熱為病肢節煩痛肩背沉重胸膈不利遍身痛下注於脛腫痛不可忍經云濕淫於內治以苦濕羌活苦辛透關節勝濕防風甘辛溫散經絡中留濕故以為主水性潤下升麻葛根苦辛平味之薄者陰中之陽引而上行以苦發之也白朮苦甘溫和除濕蒼朮體質輕浮氣力雄壯能去皮膚腠理之濕故以為臣血壅而不流則痛當歸身辛溫以散之使氣血各有所歸人參甘草甘溫補脾養正氣使苦藥不能傷胃仲景云濕熱相合肢節煩痛苦參黃芩知母茵陳苦參者乃苦以泄之也凡酒製藥以為因用治濕不利小便非其治也豬苓甘溫平澤瀉鹹平淡以滲之又能導其留飲故以為佐氣味相合上下分消其濕得以宣通也羌活半兩防風三錢二味為君升麻二錢葛根二錢白朮半錢蒼朮三錢四味為臣當歸身三錢人參二錢甘草五錢苦參酒浸二錢黃芩二錢炒知母酒洗三錢茵陳酒炒五錢豬苓三錢澤瀉三錢上伴銼如麻豆大每服一兩重水二盞半先以水拌濕候少時煎至一盞去滓溫服待少時美膳壓之天麻半夏湯治風痰內作胸膈不利頭旋目黑兀兀欲吐上熱下寒不得安臥遂處此方云眼黑頭旋虛風內外作非天麻不能除故以為君偏頭痛乃少陽也非柴胡不能治黃芩苦寒酒製炒銼柴胡治上熱又為引用故以為臣橘皮苦辛溫炙甘草甘溫補中益氣為佐生薑半夏辛溫以治風痰白茯苓甘平利小便導濕熱引而下行故以為使不數服而愈天麻一錢為君黃芩酒製五分為臣橘皮去白七分柴胡七分甘草五分為佐白茯苓五分為使半夏一錢上銼如麻豆大都作一服水一錢生薑三片煎至一錢去滓溫服五味之用苦直行而泄辛橫行而散酸束而收斂咸止而軟堅甘上行而發五入辛入肺苦入心甘入脾酸入肝鹹入腎五走辛走氣氣病無多食辛苦走骨骨病無多食苦酸走筋筋病無多食酸咸走血血病無多食鹹甘走肉肉病無多食甘五宜肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸脾色黃宜食鹹大豆豕肉栗藿皆咸肺色白宜食苦小麥羊肉杏薤皆苦腎色黑宜食辛黃黍雞肉桃蔥皆辛毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五者有辛甘酸苦鹹各有所利或散或收或緩或急或堅或軟四時五臟病各隨五病所宜也大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃殃是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道以法長有天命五多五傷多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味所傷也六化厥陰司天為風化在泉為酸化木司地氣故物化從酸少陰司天為熱化在泉為苦化火司地氣故物化從苦太陰司天為濕化在泉為甘化土司地氣故物化從甘少陽司天為炎化在泉為苦化火司地氣故物化從苦陽明司天為燥化在泉為辛化金司地氣故物化從辛太陽司天為寒化在泉為咸化水司地氣故物化從咸故治病者必明六化分治五味五色所主五臟所宜乃可以言盈虛病生之緒也謹候氣宜無失病機其主病何如言採藥之歲也司歲備物則無遺主矣先歲氣何曰天地專精之氣藥物精濃又於使用當其正氣也五運主歲不足則物薄有餘則物精非專精即散氣散氣則物不純也是以質同而異等形質雖同力用則異也氣味有厚薄性用有躁靜治保有多少力化有淺深此之謂也東垣標本陰陽論天陽無圓氣上外升生浮晝動輕躁六腑地陰有方血下內降殺沉夜靜重濕五臟夫治病當知標本以身論之則外為標內為本陽為標陰為本故六腑屬陽為標五臟屬陰為本此五臟六腑之標本也又臟腑在內為本各臟腑之經絡在外為標此臟腑經絡之標本也更人身之臟腑陰陽氣血經絡各各有標本也以病論之先受病為本後傳流病為標凡治病者必先治其本後治其標若先治其標後治其本邪氣滋甚其病益畜若先治其本後治其標雖病有十數證皆去矣謂如先生輕病而後滋生重病亦先治輕病後治重病如是則邪氣乃伏蓋先治其本故也若有中滿無問標本先治中滿謂其急也若中滿復有大小便不利亦無問標本先治大小便次治中滿謂尤急也除大小便不利及中滿三者之外皆先治其本不可不慎也從來前者為實邪從後來者為虛邪此子能令母實母能令子虛也治法云虛則補其母實則瀉其子假令肝受心火之邪是從前來者為實邪當瀉其子火也然非直瀉其火十二經絡中各有金木水火土當木之分瀉其火也故標本論云本而標之先治其本後治其標既肝受火邪先於肝經五穴中瀉滎火行間穴是也後治其標者於心經五穴內瀉滎火少府穴是也以藥論入肝經藥為引用瀉心火藥為君是治實邪之病也假令肝受腎邪是從後來者為虛虛則當補其母故標本論云標而本之先治其標後治其本既肝受水邪當先於腎經湧穴中補木是先治其標後於肝經曲泉穴中瀉水是後治其本此先治標者推其至理亦是先治其本也以藥論之入腎經藥為引用補肝經藥為君是也用藥法象天有陰陽風寒暑濕燥火三陰三陽上奉之此溫涼寒熱四氣是也溫熱者天之陽也寒涼者地之陰也此乃天之陰陽也地有陰陽金水木火士生長化收藏下應之此辛甘淡酸苦鹹六味是也皆象於地辛甘淡者地之陽也酸苦鹹者地之陰也此乃地之陰陽也味薄者為陰中之陽味薄則通酸苦鹹平是也味厚者為陰中之陰味厚則泄酸苦鹹寒是也氣薄者為陽中之陰氣薄則泄辛甘淡平寒涼是也氣厚者為陽中之陽氣厚則熱辛甘溫熱是也陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之言人身之陰陽也則外為陽內為陰背為陽腹為陰藏為陰府為陽所以欲知陰中之陰陽中之陽者何也蓋如冬病在陰夏病在陽春病在陰秋病在陽皆視其所在而施針石藥物也背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也此皆陰陽表裡內外雌雄相輸應故以應天之陰陽也形色性味體形金木水火士真假輕枯虛薄緩淺假宜治上色赤赤黃白黑深淺重潤實厚急深真宜治下性寒濕溫涼平急緩味辛酸鹹苦甘厚薄其中平者宜治中體虛實輕重平枯潤宜處方諸藥相反例甘草反大戟芫花甘遂海藻烏頭反半夏瓜蔞貝母白蘞白及黎蘆反細辛芍藥人參丹參苦參沙參用藥凡例凡解利傷風以防風為君甘草白朮為佐經云辛甘發散為陽風以辛散防風味辛乃治風通用故以防風為君甘草白朮為佐凡解利傷寒以甘草為君防風白朮為佐是寒以甘發也或有別證於前隨證治病藥內選用其分兩以君臣論之凡眼暴發赤腫以防風黃芩為君以瀉火以黃連當歸根和血為佐兼以各經藥引之凡眼久病昏暗以熱地黃當歸身為君以羌活防風為臣甘草甘菊之類為佐凡痢疾腹痛以白芍藥甘草為君當歸白朮為佐見血先後以三焦熱論凡水瀉以茯苓白朮為君芍藥甘草為佐凡諸風以防風為君隨證藥為佐凡嗽以五味子為君有痰者以半夏為佐喘者以阿膠為佐有熱無熱俱以黃芩為佐但分兩多寡不同耳凡小便不利以黃柏知母為君茯苓澤瀉為佐凡下焦有濕以草龍膽防己為君甘草黃柏為佐凡痔漏以蒼朮防風為君甘草芍藥為佐詳別證加減凡諸瘡以黃連當歸為君甘草黃芩為佐凡瘧疾以柴胡為君隨所發之時與所屬經分用引經藥佐之已上皆用藥之大要更詳別證於前隨證治病藥內逐旋加減用之制方用藥例東方甲風乙木其氣溫其味甘在人以肝膽應之南方丙熱丁火其氣熱其味辛在人以小腸心三焦胞絡應之中央戊濕而本氣平其兼氣溫涼寒熱在人以胃應之中央己土其本味鹹其兼味辛甘酸苦在人以脾應之西方庚燥辛金其氣涼其味酸在人以肺大腸應之北方壬寒癸水其氣寒其味苦在人以膀胱腎應之人乃萬物中之一也獨陽不至獨陰不長須稟兩儀之氣而生化也垂世立教不能混必當分析以至理而言則陰陽相附不相離其實一也呼則因陽出吸則隨陰入天以陽生陰長地以陽殺陰藏此上説正明補瀉君臣之一也故曰主病者為君用藥之機會要明輕清成象重濁成形本乎天者親上本乎地者親下則各從其類也清中清者清肺以助天真清中濁者榮華腠理濁中清者榮養於神濁中濁者堅強骨髓故至真要大論云五味陰陽之用辛甘發散為陽酸苦湧泄為陰淡味滲泄為陽鹹味湧泄為陰六者或收或散或緩或急或燥或潤或軟或堅各以所利而行之調其氣使之平也帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道曰有毒無毒所治為主適小大為制也又云君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者消之客者除之勞者溫之結者散之留者行之燥者潤之急者緩之散者收之損者溫之逸者行之驚者平之上者下之摩之浴之薄之劫之開之發之適事為故逆者正治從者反治從少從多觀其事也各安其氣必清必靜則病氣衰去歸其所宗此治之大體也帝曰反治何謂也岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使潰堅可使破積可使氣和可使必已方制君臣何謂也曰主病之為君佐君之謂臣應臣之謂使非上中下三品之謂也帝曰三品何謂岐伯曰以明善惡之殊貫也用丸散藥例仲景云銼如麻豆大與㕮咀同意夫㕮咀古之制也古者無鐵刀以口咬細令如麻豆為粗藥煎之使藥水清飲於腹中則易升易散也此所謂㕮咀也今人以刀器銼如麻豆大此㕮咀之易成也若一概為細末不分清濁矣經云清陽發腠理濁陰走五臟果何謂也又曰清陽實四肢濁陰歸六腑是也㕮咀之法取清汁易行經絡故也若治至高之病加酒煎以去濕加生薑煎補元氣以大棗煎發散風寒以蔥白煎去膈上病以蜜煎散者細末也不循經絡止去胃中及臟腑之積氣味厚者白湯調服氣味薄者煎熟和柤服服百丸者去下部之疾者其丸極大而光且圓治中焦者次之治上焦者極小稠麵糊丸者取其遲化直至下焦或酒或醋丸者取其收散之意也犯半夏南星欲去濕痰者以生薑汁煮糊為丸者又易化也煉蜜為丸者取其運化而氣循經絡也蠟丸者取其難化而旋旋施功也大抵湯者蕩也去久病者用之散者散也去急病者用之丸者緩也不能速去其病用藥舒緩而治之也古今方劑錙銖分兩與今不同謂㕮咀者即今之如麻豆大是也云一升者今之大白盞也云銖者大銖乃一分是二錢半也二十四銖為一兩云三兩者今之一兩云二兩者今之六錢半也料例大者今之三分之一足矣論用藥必本四時凡用藥者若不本四時以順為逆四時者是春升夏浮秋降冬沉乃天地之升降浮沉造化者脾土中造化也是為四時之宜但言補之以辛甘溫熱之劑及味之薄者諸風藥是也此助春夏之升浮者也此便是瀉秋收冬藏之藥也在人之身乃肝心也但言之以酸苦寒涼之劑並淡味滲泄之藥此助秋冬之降沉者也在人之身乃肺腎也用藥者因此法度則生逆之則死縱令不死危困必矣五行五色五味五走五臟主禁例東方之木其色青其味酸其藏肝肝主筋木曰曲直曲直作酸酸走肝筋病人毋多食酸南方之火其色赤其味苦其藏心心主血火曰炎上炎上作苦苦走心心病人毋多食苦西方之金其色白其味辛其藏肺肺主氣金曰從革從革作辛辛走肺氣病人毋多食辛北方之水其色黑其味鹹其藏腎腎主骨水曰潤下潤下作咸咸走腎骨病人毋多食鹹中央之土其色黃其味甘其藏脾脾主肉土曰稼穡稼穡作甘甘走脾肉病人毋多食甘東垣論君臣佐使至真要大論曰有毒無毒所治為主主病者為君佐君者為臣應臣者為使一法力大者為君凡藥之所用皆以氣味為主補瀉在味隨時換氣薄者為陽中之陰氣厚者為陽中之陽味薄者為陰中之陽味厚者為陰中之陰辛甘淡之熱者為陽中之陽辛甘淡之寒者為陽中之陰酸苦酸之寒者為陰中之陰酸苦鹹之熱者為陰中之陽夫辛甘淡酸苦鹹乃味之陰陽又為地之陰陽也溫涼寒熱乃氣之陰陽又為天之陰陽也氣味生成而陰陽造化之機存焉一物之內氣味兼有一藥之中理性具焉主對治療由是而出假令治表實麻黃葛根表虛桂枝黃耆裡實枳實大黃裡虛人參芍藥熱者黃芩黃連寒者乾薑附子之類也君藥分兩最多臣藥次之佐使藥又次之不可令臣過於君君臣有敘相與宣攝則可以御邪除病矣王海藏云常人求診拱默苟令切脈試其能知病否且脈人之氣血附行於經絡熱勝則脈疾寒勝則脈遲實則有力虛則無力至於得病之由及所傷之物豈能以脈知乎故醫者不可不問其由病者不可不説其故孫真人云未診先問最為有準東坡亦云只圖愈疾不圖困醫二公之言良為有理故書之以破世人之惑矣
