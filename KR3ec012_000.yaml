body:
  text: 校刻本草發揮敘論百家言醫丙閎邃長於保身利物故名儒碩士咸究肆焉論著日以繁矣醫之道明於六氣百體之升降盈縮沉浮緩急如燭之照斯臻神品顧非多識於金石草木鳥獸之名與其性味之寒溫甘苦良毒某也中某疾某為君臣某為佐使則制量小不如宜醫罔奏功嗚呼艱哉後世言方藥祖神農本草闡其義者潔古張氏東垣李氏海藏王氏諸家元至正間山陰徐用誠復集丹溪朱氏聊攝成氏之言訂説補缺匯粹成編命曰本草發揮吾郡贈南京太醫院判薛君良武嘗校定之其子辛甫視篆南院梓之以傳間以敘屬余余恆嘆為人子者視其親之遺罔知所重古所謂手澤存於父書口澤存於杯棬意何如也辛甫每之及乃父抱藝弗售歿於京師輒欷歔痛念竟以醫顯褒贈其親是編以父所嘗校定拳拳梓行其孝可知且為吏者往往怠於其官私其身圖辛甫在醫院廉勤視事親晝整整俸余新公㑊若干楹校刻外科心法外科發揮癰疽灸經癰疽驗方十四經絡發揮暨是編凡若干卷可謂能其官矣嗚呼儒者之道曰孝與忠辛甫志行如斯其殆儒醫矣乎余敘是編而樂道之南京吏部驗封郎中吳郡顧夢圭敘
