body:
  text: 卷一金石部丹砂味甘微寒無毒衍義云鎮養心神但宜生使潔古云辰砂心熱者非此不能除經云丹砂法火故色赤而主心東垣云硃砂味甘寒純陰納浮溜之火而安神明也石鐘乳丹溪云石鐘乳為慓悍之劑經云石藥之氣悍仁哉言也天生斯民養之以谷及其有病治之以藥谷則氣之和常食而不厭藥則氣之偏可用於暫而不可久石藥則又偏之甚者也自唐時太平日久膏粱之家惑於方士服食致長生之說以藥石體重氣厚可以延年習以成俗迨宋及今猶未已也斯民何辜受此氣悍之禍而莫之能救哀哉本草贊其久服有延年之功而柳子厚又從而述其美予不得不深言之硝石味苦辛咸大寒有小毒主五臟積熱胃脹閉滌去蓄結飲食推陳致新止煩滿消渴利大小便藥性云破血破積散堅結治腹脹日華云含之以治喉閉海藏云硝石味鹹而辛辛微緩於咸硝石者硝之總名也但不經火者謂之生硝朴硝經火者謂之盆硝芒硝古人用辛今人用鹹辛能潤燥咸能軟堅其意皆是老弱虛人不可下者若欲用者以玄明粉代之尤佳本經云利小便而隕腸傷寒妊娠不可下者用必兼以大黃引之直入大腸潤燥軟堅瀉熱子母俱安內經云有故無殞亦無殞也此之謂歟以在下言之則便溺俱陰以前後言之則前氣後血以腎言之則總主大小便難溺澀秘結俱為水少經言熱淫於內治以鹹寒佐以苦辛故用芒硝大黃相須為使也芒硝主五臟積熱胃閉除邪氣破留血腹中痰實通經脈利大小便及月水破五淋推陳致新藥性云下瘰癧黃疽墮胎治漆瘡以汁敷之成聊攝云熱淫所勝治以鹹寒芒硝之咸以攻蘊熱又云芒硝一名硝石以其咸能軟堅潔古云芒硝性寒味鹹氣薄味厚沉而降陰也其用有三去實熱一去腸中垢二堅積熱塊三也孕婦忌之又云鹹寒純陰熱淫於內治以鹹寒丹溪云治胞衣不下以童便調芒硝一二錢熱服之立下牛馬胞不下亦可用之朴硝主除寒熱邪氣逐六腑積聚結固留癖胃中食飲熱結留血閉絕停疾痞滿推陳致新能化七十二種石日華云主通泄五臟百病及癥結天行熱疾消腫毒丹溪云硝屬陽金而有水與火主善消化驅逐而經言無毒化七十二種石不毒而能之乎以之治病則致其用病退則已若玄明粉者以其火煅而成其性當溫遂曰常服多服久服皆可豈理也哉玄明粉味辛甘冷無毒治心熱煩躁並五臟宿滯癥結明目退膈上虛熱消腫毒大陰號云治一切熱毒風痃症氣脹滿口苦幹澀咽喉閉塞積熱驚悸健忘榮衛不調中酒中鱠飲食過度四肢壅塞腸風痔疾血癖不消東垣云玄明粉大抵用此以代盆硝佳海藏云本草注云治骨蒸五勞驚悸熱毒風等服之立愈正經云味辛甘性冷則治熱病明矣兼味辛又鹹此能潤燥而軟堅也非大便燥結脈滑有力而洪大者不宜服卻言暖水臟女子服之補益血脈有失用藥寒熱之本意經云咸能勝血豈能補血哉又有治陰毒一句其言尤錯矣若與硫黃附子及諸陽藥多寡相佐而行則可以治陰中有伏陽者若的是陰毒別無伏陽殺人甚速太清伏煉法云硝能制伏陽精解火石之毒則不治陰耳用者宜審也滑石味甘寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱通九竅六腑津液去留結止渴令人利中成聊攝云滑石之滑以利水道潔古云氣寒味甘治前陰竅澀不利性沉重能泄氣上令下行故曰滑則利竅不比與滲淡諸藥同色白者佳水飛細用海藏云入足太陽經滑能利竅以通水道為至燥之劑滑石木通豬苓阿膠同為滑劑以利水道蔥豉生薑同煎去滓澄清服之淡味滲泄為陽以解表利小便也若小便少利則不宜以此解之丹溪云滑石屬金而有土與水無甘草以和之勿用能燥濕分水道實大腸化食毒行積滯逐凝血解煩渴補脾胃降心火之要藥也禹餘糧味甘寒平無毒主咳逆寒熱煩滿下利赤白癥瘕小腹痛結煩疼成聊攝云重可去怯禹餘糧之重以為鎮固緊石英海藏云入手少陰經足厥陰經赤石脂味甘酸辛大溫無毒療腹痛泄澼下痢赤白小便利女子崩中漏下日華云治吐血衄並澀精淋瀝安心鎮驚悸成聊攝云澀可去脫石脂之澀以收斂之又云赤石脂澀以固腸胃海藏云本經言澀可去脫石脂為收斂之劑胞衣不出澀劑何以下之赤者入丙白者入庚潔古云赤白二石脂俱甘酸陰中之陽也固脫硇砂味鹹苦辛溫大熱有大毒不宜多服主積聚破血結爛胎去惡肉生好肉柔金銀藥性云能消五金八石腐壞人腸胃生食之化入心為血陳藏器云主飲食不消痃癖痰飲日華子云消氣塊及惡瘡息肉食飽脹東垣云味鹹苦辛溫有毒破堅癖去積破結血爛胎獨味不用入群隊中用之石膏味辛甘大寒無毒除時氣頭痛身熱三焦大熱解肌發汗止消渴咽熱成聊攝云石膏味甘辛微寒風陽邪也寒陰邪也風則傷陽寒則傷陰榮衛陰陽為風寒兩傷則非輕劑所能獨散也必須輕重之劑以同散之乃得陰陽之邪俱已榮衛之氣俱和是以大青龍湯以石膏為使石膏為重劑而又專達肌表者也又云熱淫所勝佐以苦甘知母石膏之苦甘以散熱潔古云治足陽明經中熱發熱惡熱燥日晡潮熱自汗小便赤濁大渴引飲身體肌肉壯熱苦頭痛之藥白虎湯是也善治本經頭痛若無以上證勿服多有脾胃虛勞形體病證初得之時與此有餘之證同者若醫者不識而誤用之則不可勝救矣主治秘訣云性寒味淡氣味俱薄體重而沉降陰中之陽也乃陽明經大寒之藥能傷胃氣令人不食非腹有極熱者不可輕用能止陽明經頭痛胃弱者不可服治下牙痛者須用白芷為使發引東垣云石膏辛甘除三焦熱傷寒頭痛甘寒胃經大寒藥潤肺除熱解肌發汗海藏云石膏發汗辛寒入手太陰經東垣曰石膏足陽明藥也又治三焦大熱手少陽也仲景治傷寒陽明經證身熱目痛鼻乾不得臥身以前胃之經也胸者胃肺之室也邪熱在陽明肺受火制故用辛寒以清肺所以號為白虎湯也唐本注云療風去熱解肌衍義云仲景白虎湯中服之如神新校正仲景傷寒論後言四月以後天氣熱時用白虎湯者是也然四方氣候不齊及歲月氣運不一方所既異當用之時亦宜兩審其說甚雅若傷寒熱病大汗後脈洪大口舌燥頭痛大渴不已或著暑熱身疼倦怠白虎湯服之無有不效石膏為白虎湯之君主也知母條下更有說丹溪云嘗觀藥之命名固有不可曉者中間亦多有意義學者不可不察如以色而名者大黃紅花白前青黛烏梅之類是也以氣而名者木香沉香檀香麝香之類是也以形而名者人參狗脊烏喙貝母金鈴子之類是也以質而名者厚朴乾薑茯苓生熟地黃之類是也以味而名者甘草苦參龍膽淡竹葉苦酒之類是也以能而名者百合當歸升麻防風消石之類是也以時而名者半夏茵陳冬葵寅雞夏枯草之類是也石膏火煅細研醋調封丹爐其固密甚於石脂苟非石膏焉能為用此兼質與能而得名正與石脂同意閻孝忠妄以方解石為石膏況石膏味甘辛本陽明經藥陽明主肌肉其甘也能緩脾益氣止渴去火其辛也能解出汗上行至頭又入手太陰手少陽彼方解石止有體重實堅性寒而已求其所謂有膏而可為三經之主者安在哉醫欲責效不亦難乎又云軟石膏可研為末醋丸如綠豆大以瀉胃火痰火食積殊驗鉛丹味辛微寒有毒主吐逆驚癇金瘡散血藥性云煎膏用以止痛生肌潔古云本經言澀可去脫而固氣成無己云鉛丹收斂神氣以鎮驚也丹溪云鉛丹屬金而有土與水火丹出於鉛而日華子云涼無毒予竊疑焉曾見一中年婦人因多子於月內服鉛丹二兩遂四肢冰冷強直食不入口時正仲冬遂急服理中湯加附子與數十貼而安謂之涼而無毒可乎鉛粉味辛甘寒無毒殺三蟲去鱉瘕療惡瘡墮胎藥性云治積聚不消焦炒止小兒疳痢丹溪云胡粉另是一種乃錫粉非鉛粉蓋胡人以錫為粉故名胡粉不可入藥惟婦人用以敷面喜其色類肌肉也又名粉鑞即錫也代赭石味苦甘寒無毒除五臟血脈中熱驚氣入腹成聊攝云怯則氣浮重劑所以鎮之代赭之重以鎮虛逆海藏云經言怯則氣浮重劑所以鎮之怯者亦驚也入手少陽經足厥陰經自然銅味辛平寒有小毒療折傷散血止痛丹溪云自然銅世以為接骨藥然此等方盡多大抵妙在補氣補血補胃俗工不知惟求速效以罔利迎合病人之意而自然銅非煅不可服若服新出火者其火毒金毒相扇又挾香熱藥之毒雖有接傷之功其燥散之禍甚於刀劍戒之戒之滷咸一名鹼公斬切味苦咸寒有小毒丹溪云石鹼去濕熱消痰磨積塊洗滌垢膩量虛實用之若過服則頓損又云石鹼阿魏皆消積塊石硫黃味酸大熱有毒衍義云今人用治下元虛冷元氣將絕久患寒泄脾胃虛弱欲垂命盡服之無不效中病當便已不可盡劑海藏云如太白丹佐以硝石來復丹用硝石之類以至陽佐以至陰也與仲景白通湯佐以人溺豬膽汁大意相同所以去格拒之寒兼有伏陽不得不爾如無伏陽只是陰證更不必陰藥佐之也硫黃亦號為將軍功能破邪歸正返滯還清挺出陽精消化陰魄而生魂繰絲湯丹溪云口乾渴者可用此吐之此物屬火有陰之用能泄膀胱水中相火以引清氣上朝於口按究原方治消渴以繰絲湯飲之或以繭殼絲綿煮湯飲之亦可漿水丹溪云味甘酸而性涼善走化滯物解煩渴麻沸湯成聊攝云瀉心湯以麻沸湯漬服者取其氣薄而瀉虛熱也潦水成無己云赤小豆湯煎用潦水者亦取其水味薄則不助濕氣也甘瀾水其法取水二斗置大盆內以杓融之水上有珠子五六千顆相逐乃取用之無己云煎用甘瀾水揚之無力取不助腎氣也草部人參味甘微溫無毒主補五臟安精神定魂魄止驚悸除邪氣霍亂吐逆調中止消渴通血脈藥性云患人虛而多夢加而用之成聊攝云脾欲緩急食甘以緩之人參之甘以緩脾氣潔古云人參治脾肺陽氣不足及肺氣喘促短氣少氣補中緩中瀉脾肺胃中火邪善治短氣少氣非升麻為引用不能補上升之氣升麻一分人參三分可為相得若補下焦元氣瀉腎中火邪茯苓為之使甘草梢子生用為君去莖中病或加苦楝酒煮玄胡索為主尤佳主治秘訣云性溫味甘氣味俱薄浮而升陽也其用有三補元氣止渴生津液也肺虛者用之又能補胃治喘嗽則勿用短氣則用之東垣云人參甘溫能補肺中之氣肺氣旺則四臟之氣皆旺肺主諸氣故也仲景以人參為補血者蓋血不自生須得生陽氣之藥乃生陽生則陰長血乃旺矣若陰虛單補血血無由而生無陽故也又云補氣須用人參又云安胃和中又云人參補元氣不足而瀉肺氣甘溫補陽利止而脈不足者是亡血也人參補之益脾氣與乾薑同用補氣裡虛則腹痛此藥補之是補其不足也又云人參補氣之藥如氣短氣不調及喘者加之海藏云味既甘溫調中益氣即補肺之陽瀉肺之陰也若但言補肺而不論陰陽寒熱何氣不足則誤矣若肺受寒邪宜此補之肺受火邪不宜用也肺為天之地即手太陰也為清肅之藏貴涼而不貴熱則其寒象可知若其傷熱則宜沙參沙參味苦微寒無毒主血積驚氣除寒熱補中益肺氣治胃痹心痛結熱邪氣頭痛皮間邪熱安五臟人參味甘微溫補五臟之陽也沙參味苦微寒補五臟之陰也安得不異易老取沙參以代人參取其苦也苦則補陰甘則補陽本經雖云補五臟亦須各用本藏藥相佐使隨所引而相補一臟豈可不知丹溪云人參入手太陰經而能補陰火甚與其蘆相反若服參一兩於內入蘆一錢則一兩之參徒虛費矣戒之甘菊花潔古云甘菊花味甘苦養目血東垣云甘菊花治頭風頭眩明目丹溪云甘菊花屬金而有水與土大能補陰須是味甘莖紫者若山野間味苦莖青者勿用大傷胃氣謹戒之天門冬味苦甘平大寒無毒主保定肺氣去熱養肌膚益氣力利小便冷而能補潔古云保定肺氣治血熱侵肺止喘氣促加人參黃耆用之為主如神味苦甘性寒味厚氣薄陰也苦以泄滯血甘以助元氣及治血妄行此天門冬之功也東垣云天門冬味苦甘主肺氣喘息促急除熱通腎氣鎮心潤五臟強骨髓海藏云天門冬入手太陰足少陰經榮衛枯涸者溫劑所以潤之天麥二門冬人參五味子枸杞子同為生脈之劑此上焦獨取寸口之意甘草味甘平無毒主五臟六腑寒熱邪氣溫中下氣煩滿短氣傷藏咳嗽止渴通經脈利血氣解百藥毒藥性云病人虛而多熱者加用之成無己云甘草甘平以除熱又云脾欲緩急食甘以緩之用甘補之人參白朮之甘以緩脾氣調中潔古云甘草性平味甘生用之則大涼瀉熱火炙之則能補三焦元氣調和諸藥相協力共為而不爭性緩善解諸急故有國老之稱主治秘訣云性寒味甘氣薄味厚可升可降陰中陽也其用有五和中補陽氣調和諸藥能解其太過去寒邪此為五也腹脹則忌之又能養血補腎生甘草梢子去腎莖之痛胸中積熱非梢子不能除又云補血不足用甘草凡用純寒純熱之藥必用甘草以緩其力也寒熱相雜藥亦用甘草調和其性也中滿者禁用經云中滿者勿食甘東垣云生甘草補脾胃不足大瀉心火又云甘草味甘生寒炙溫純陽陽不足者補之以甘又云炙之以散表寒除邪熱去咽痛除熱緩正氣緩陰血潤肺海藏云經云脾欲緩急食甘以緩之甘以補脾能緩之也故湯液用此以建中經曰甘者令人中滿又曰中滿者勿食甘則知非中滿之藥也甘入脾歸其所喜故也或問附子理中湯調胃承氣湯皆用甘草者如何是調和之意曰附子理中用甘草者恐其大僭也調胃承氣用甘草者恐其速下也三藥用之非調和也皆緩之也小柴胡湯有柴胡黃芩之寒人參半夏之溫其中用甘草者即有調和之意鳳髓丹用甘草者緩腎濕而生元氣亦甘補之意也經曰以甘補之以甘緩之以甘瀉之本草云治七十二種石毒一千二百般草木毒調和諸藥有功故名國老雖非君而為君所宗所以安和草石而解諸毒也於此可見調和之意者夫五味之用苦直行而泄辛橫行而散酸束而收斂咸止而軟堅甘上行而發如何本草言下氣蓋甘之味有升降浮沉可上可下可內可外有和有緩有補有瀉居中之道盡矣入足太陰足厥陰足少陰三經能治肺痿之膿血若作吐劑能消五發之癰疽每用甘草二兩水三碗慢火熬至半碗去滓服之消瘡腫與黃耆同功黃耆亦能消諸腫癰疽修治之法與甘草同丹溪云生甘草大緩諸火邪下焦藥宜少用恐大緩不能自達熟乾地黃味甘苦日乾者平火乾者溫無毒潔古云熟地黃酒灑九蒸假酒力則微溫補血虛不足虛損血衰之人須用善黑鬚發忌萊菔主治秘訣云性溫味苦甘氣薄味厚沉而降陰也其用有五益腎水真陰一也和產後血氣二也去腹臍急痛三也養陰退陽四也壯水之源五也治外治上以酒浸之東垣云地黃生則性大寒而涼血熟則性微溫而補腎又云熟地黃當歸身牡丹皮此三味諸經中和血生血涼血海藏云生地黃治手足心熱及骨蒸熱入手足少陰手足厥陰能益腎水而涼血其脈洪實者宜用生地黃若脈虛者則宜熟地黃假火力蒸九次故能補腎中元氣仲景制八味丸以熟地黃為諸藥之首者天一所生之源也湯液四物湯以治藏血之臟亦以熟地黃為君者癸乙同歸一治也蒸搗不可犯鐵器若犯之令人腎消陳藏器云蒸於則溫補生干則平宣機要云熟地黃治臍下發熱者腎經病也非地黃不能除補腎也益陰之劑二宜丸加當歸為補髓煎生地黃味甘平大寒無毒主婦人崩中血不止潔古云生地黃性寒味苦涼血補血補腎水真陰不足治少陰心熱在內此藥大寒宜斟酌用之恐損胃氣主治秘訣云性寒味苦氣薄味厚沉而降陰也其用有三涼血一也除皮膚燥二也去諸濕澀三也又云陰中微陽酒浸上行海藏云手少陰手太陽之藥故錢氏瀉內與木通同用以導赤也諸經之血熱與他藥相隨亦能治之溺血便血亦治之蒼朮味苦辛溫無毒主風寒濕痹消痰火暖胃消穀嗜食瘟疾山嵐瘴氣潔古云蒼朮氣溫味甘主治與白朮同若除上濕發汗功最大若補中焦除中濕力少加白朮腹中窄狹者須用之若治脛足濕腫加白朮又云蒼朮體輕浮氣力雄壯能去皮膚間腠理濕東垣云入手陽明太陰能健胃安脾本草但言術不言蒼白其蒼朮別有雄壯上行之氣能除濕下安太陰使邪氣不內傳於太陰也以其經泔浸火炒故能發汗與白朮止汗特異用者不可以此代彼蓋蒼白有止發之異也丹溪云蒼朮治上中下濕痰俱可用之白朮味甘辛無毒消宿食去痰涎除寒熱止下泄治水腫脹滿止嘔逆腹內冷痛及胃氣虛而冷痢成聊攝云脾惡濕甘先入脾茯苓白朮之甘以益脾逐水潔古云白朮除濕益燥和中益氣利腰臍間血除胃中熱主治秘訣云氣溫味甘微苦氣味俱薄浮而升陽也其用有九溫中一去脾胃濕二除脾胃熱三強脾胃進飲食四和脾胃以生津液五主肌熱六治四肢困倦目不欲開怠情嗜臥不思飲食七止渴八安胎九也又云脾胃受熱濕沉困無力怠惰嗜臥並去痰須用白朮飲水多因致傷脾須用白朮茯苓豬苓水瀉須用白朮茯苓芍藥又云非白朮不能去濕東垣云白朮味苦而甘性溫味厚氣薄陽中陰也去諸經中濕而理脾胃潔古云溫中去濕除熱強胃蒼朮亦同但味頗厚耳下行則用之甘溫補陽益脾逐水寒淫所勝甘以緩脾生津去濕渴者用之又云白朮佐黃芩以安胎君積實以消痞海藏云本草本條下無蒼與白之名近代多用白朮治皮間風止汗消痞補胃補中利腰臍間血利水道上而皮毛中而心胸下而腰臍之間在氣主氣在血主血入手太陽足陽明手少陰足太陰足厥陰潔古云非白朮不能去濕非枳實不能消痞除濕利水如何是益津液丹溪云白朮有汗則止無汗則發與黃耆同功味亦有辛大能消虛痰也牛膝味苦酸平無毒主寒濕痿痹四肢拘攣膝痛不可屈伸墮胎男子消陰老人失溺婦人月水不通補腎填精逐惡血留結助十二經脈壯陽潔古云牛膝強筋丹溪云牛膝之用能引諸藥下至於足凡用土牛膝春夏用莖葉秋冬用根惟葉汁之效尤速茺蔚子一名益母味辛甘微寒無毒主明目益精其莖主癮疹癢可作浴湯治產後血脹苗葉同功丹溪云益母草治產前產後諸疾行血養血難產作膏服良柴胡味苦平微寒無毒主除傷寒心下煩熱諸痰熱結實治熱勞骨節煩痛時疾內外熱不解胸脅氣滿成無己云柴胡之苦以發表熱又云柴胡黃芩之苦入心而折熱潔古云柴胡除虛勞煩熱解散肌熱去早晨潮熱此手足少陽厥陰四經行經藥也善除本經頭痛非他藥所能止治心下痞胸膈中痛能引胃氣上升以發散表熱去寒熱往來膽痹非柴胡梢不能除之又去脅下痛往來寒熱及日晡發熱用柴胡主治秘訣云柴胡味微苦性平微寒氣味俱輕陽也升也少陽經分藥偏頭痛乃少陽也非柴胡不能除東垣云柴胡瀉肝火須用黃連佐之欲上升則用根酒浸欲中及下降則生用梢又治瘡瘍癖積之在左又云十二經瘡藥中須用以散諸經血結氣聚功用與連翹同海藏云入足少陽主東方分之氣也在經主氣在藏主血證前行則惡熱卻退則惡寒雖氣微寒味之薄者故能行經是主氣也若佐以三稜廣朮巴豆之類故能消堅積是主血也婦人經水適來適斷傷寒雜病潔古須用小柴胡主之加以四物之類並秦艽牡丹皮輩同為調經之劑衍義云柴胡本經並無一字治勞今人治勞方中鮮有不用者嗚呼凡此誤世多矣嘗原病勞有一種真藏虛損復受邪熱因虛而致勞故曰勞者牢也須斟酌用之如經驗方中治勞熱青蒿煎凡用柴胡正合宜耳服之無不效熱去即須急已若或無熱而得此則病愈甚日華子又謂補五勞七傷藥性論亦謂治勞乏羸瘦若此等病苟無實熱醫者取而用之不亡何待註釋本草一字亦不可忽蓋萬世之後所誤無窮爾苟有明哲之士自可處制中下之士所學不肯考究枉致淪沒可不謹哉可不戒哉如張仲景治寒熱往來如瘧狀用柴胡湯正合其宜圖經云張仲景治傷寒有大小柴胡及柴胡龍骨牡蠣柴胡加芒硝等湯故後人治傷寒寒熱以此為最要之藥東垣云柴胡者能引清氣而行陽道傷寒外諸藥所加有熱則加之無熱則不可加又能引胃氣上行升騰如春令也欲其如此又何加之能去內外臟腑俱之能引清氣上行而順陽道蓋以少陽之氣初出地之皮為嫩陽故以少陽當之麥門冬味甘平微寒無毒主虛勞客熱口乾燥渴定肺氣治心肺虛熱成聊攝云肺燥氣熱以酸收之以甘緩之門冬之甘潤肺除熱潔古云麥門冬治肺中伏火脈氣欲絕加五味子人參二味名之生脈散補肺中元氣不足須用之又治經枯乳汁不行湯潤去心用引經須以酒浸東垣云麥門冬味甘平陽中之陰主心腹結氣腸中傷飽虛勞客熱保定肺氣止煩渴又云補心氣不足及治血妄行甘平補不足海藏云入手太陰經衍義云治心肺虛熱及虛勞客熱苗可作熟水飲之獨活味苦甘平辛微溫無毒療諸賊風百節痛諸風濕冷皮肌苦癢手足攣痛潔古云獨活足少陰腎經行經藥也若與細辛同用治少陰經頭痛如神主治秘訣云性溫味苦氣厚味薄沉而升陰中陽也治風須用反能燥濕經云風能勝濕頭暈目眩非此不能除東垣云獨活治足少陰伏風而不治太陽故兩足寒痹不能動履非獨活不能治羌活味辛苦無毒治賊風多癢血癩手足不遂口面喎斜遍身𤸷痹治一切風赤目疼痛潔古云羌活治肢節疼痛手足太陽本經風藥也加川芎治足太陽少陰頭痛透關利節又治風濕主治秘訣云性溫味辛氣味俱薄浮而升陽也其用有五手足太陽引經一風濕相兼二去肢節痛三除癰疽敗血四治風濕頭痛五也東垣云羌活獨活防風此三味治手足太陽證脊痛項強不可回顧腰似折項似拔者海藏云羌活君藥也非無為之主乃撥亂反正之主也故大無不通小無不入關節痛非此不治太陽經頭痛肢節痛一身盡痛非羌活不能除足太陽足厥陰足少陰藥也與獨活不分二種後人用羌活多用鞭節者用獨活多用鬼眼者羌活則氣雄獨活則香細故氣雄者入太陽香細者入少陰也錢氏瀉青丸用此者壬乙同非一治也或問治頭痛者何答曰巨陽從頭走足惟厥陰與督脈會於巔逆而上行諸陽不得下故令頭痛也足太陽厥陰之藥也升麻味甘苦平微寒無毒闢瘟疫瘴氣頭痛喉痛口瘡時氣熱疾牙根浮爛惡臭碗豆瘡口氣疳䘌成聊攝云玉函曰大熱之氣寒以取甚熱之氣以汗發之麻黃升麻之甘以發浮熱潔古云升麻乃足陽明胃足太陰脾行經藥也若補脾胃非此為引用不能補若得白芷蔥白之類亦能走手陽明太陰非此四經不可用也能解肌肉間熱此手足陽明傷風引用之藥也主治秘訣云氣溫味辛氣味俱薄浮而升陽也其用有四手足陽明引經一升陽氣於至陰之下二陽明經分頭痛三去風邪在皮膚及至高之上四也治脾癉非升麻梢不能除東垣云主發散陽明經風邪元氣不足者用此於陰中以升其陽氣上行也又云引蔥白散手陽明之風邪引石膏止足陽明之齒痛海藏云升麻入足陽明若初病太陽證便服升麻葛根發出陽明經汗或失之過陽明經燥太陽經不可解必傳陽明矣故投湯不當非徒無益而又害之也朱氏云瘀血入里治衄血吐血者犀角地黃湯乃陽明之聖藥也如無犀角以升麻代之升麻犀角性味相遠不同何以代之蓋以升麻是引地黃及余藥同入陽明經耳初病太陽證服升麻可乎仲景云太陽治發汗若下治利小便重亡津液胃中乾燥因而轉屬陽明病其害不可勝言仲景又云太陽兀兀無汗者葛根湯發之若兀兀自汗者表虛也不宜用此朱氏用葛根升麻者以表實無汗也車前子味甘咸寒無毒主氣癃止痛利水道治肝中風熱衡目赤痛障翳腦痛淚出其葉通五淋治尿血海藏云能利小便而不走精氣與茯苓同功木香味辛溫無毒治九種心疼積年冷氣痃癖症塊脹痛治霍亂吐瀉心腹疼痛治心腹一切氣止痢疾安胎健脾消食及膀胱冷痛嘔逆翻胃潔古云除肺中滯氣若療中下焦氣結滯須用檳榔為使主治秘訣云氣熱味辛苦氣味俱厚沉而降陰也其用調氣而已又云辛純陽以和胃氣東垣云木香味苦辛純陽治腹中氣不轉運助脾又云辛溫升降滯氣海藏云木香治血氣刺心痛冷積氣痃癖癥瘕腹脹通行一切氣安胎健脾膀胱冷痛嘔逆反胃霍亂吐瀉九種心疼痢疾本經云主氣劣氣不足補也衍義云專泄決胸腹間滯寒冷氣破也安胎健脾補也除痃癖塊破也與本條言補不同何也易老以為調氣之劑不言補也丹溪云木香行肝經氣火煨用可實大腸薯蕷味甘平溫無毒主傷中補虛羸益氣力長肌肉強筋骨補五勞七傷心氣不足治泄精健忘海藏云入太陰之藥潤皮毛之燥涼而能補與二門冬同東垣云仲景八味丸用乾山藥者以其涼而能補也亦治皮膚乾燥以此物潤之丹溪云山藥屬土而有金與水火補陽氣生者能消腫硬經云虛之所在邪必湊之著而不去其病為實非腫硬之謂乎故補其氣則留滯自不容於不行矣薏苡仁味甘平微寒無毒主筋急拘攣風濕痹除筋骨邪氣不仁肺痿吐膿血治乾溼腳氣治肺癰心胸甲錯丹溪云寒則筋急熱則筋縮急因於堅強縮因於短促治受濕則弛弛因於寬長然寒與熱未嘗不挾濕三者皆因於濕然外濕非內濕有以啟之不能成致濕之病蓋因酒面為多而魚與肉繼以成之若甘滑陳久燒炙香辛乾硬之物皆致濕之因也戒之慎之澤瀉味甘咸寒無毒逐膀胱三焦停水治五淋宣通水道長於行水多服病人眼成聊攝云鹹味湧泄為陰澤瀉之咸以泄伏水滑利竅潔古云除濕之聖藥也治小便淋瀝去陰間汗無此疾者服之令人目盲主治秘訣云性寒味鹹氣味俱厚沉而降陰也其用有四入腎經一去舊水養新水二利小便三消水腫四也又云滲泄止渴海藏云衍義言澤瀉之功尤長於行水張仲景治水畜煩渴小便不利或吐或瀉五苓散主之方用澤瀉故知其用長於行水本經又引扁鵲云多服病人眼誠為行去其水仲景八味丸用之者亦不過接引桂附等非就腎經別無他意凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用本經云久服目明扁鵲云多服病人眼何也易老云去胞中留垢以其味鹹能瀉伏水故去留垢即腹中陳久積物也入足太陽少陰經仲景治太陽中風入里渴者五苓散主之龍膽味苦寒無毒益肝膽氣止驚惕明目止煩小兒驚癇潔古云治兩目赤腫睛脹瘀肉高起痛不可忍以柴胡為主龍膽為使治眼中之病必用藥也主治秘訣云性寒味苦辛氣味俱厚沉而降陰也其用有四除下部風濕一也除濕熱二也臍以下至足腫痛三也寒濕腳氣四也其用與防己同酒浸上行及外行細辛味辛溫有小毒主咳逆頭痛風濕痹痛溫中下氣開胸中滯益肝膽明目利九竅治惡風頭風止眼風淚下除齒痛治頭面痛不可缺者也成聊攝云細辛附子之辛以溫少陰之經潔古云治少陰經頭痛如神當少用之獨活為之使主治秘訣云性溫味辛氣厚於味輕清上浮而升陽中陰也止諸陽頭痛諸風通用辛熱溫少陰之經散水寒治內寒東垣云細辛味大辛純陽主手少陰經頭痛又云去風頭痛及皮膚風熱海藏云東垣言細辛治邪在裡之表故仲景少陰證用麻黃附子細辛湯也易老云治少陰苦頭痛太陽則羌活少陰則細辛陽明則白芷太陰則蒼朮厥陰則川芎吳茱萸少陽則柴胡用者隨經不可差也細辛香味俱細而緩故入少陰與獨活頗相類藍實丹溪云藍屬水而有木能使散敗之血分歸經絡芎藭味辛生溫熟寒無毒主中風入腦頭痛面上遊風治一切風一切氣一切血破宿血養新血長肉諸瘡瘍及排膿潔古云補血治血虛頭疼之聖藥也治妊婦數月胎動加當歸二味各二錢水二錢煎至一錢服之神效主治秘訣云性溫味辛苦氣味厚薄浮而升陽也其用有四手少陽引經一也諸經所痛二也助清陽之氣三也去濕氣在頭四也東垣云頭痛須用川芎如不愈加各引經藥太陽羌活陽明白芷少陽柴胡太陰蒼朮厥陰吳茱萸少陰細辛如頂巔痛去川芎用加藁本又云芎藭味辛溫純陽主中風入腦頭面風海藏云易老言川芎上行頭角下行血海故清神四物皆所用也入手足厥陰衍義云頭面風不可缺也然須以他藥佐之治單服既久則走散真氣既以他藥佐之又不可久服中病便已可也東垣曰頭痛甚者加蔓荊子頂與腦痛加川芎頭頂痛者加藁本諸經頭痛者加細辛治有熱者不能治別有清空之劑能緣諸經頭痛並用此四物丹溪云芎久服能致暴亡以其辛溫也辛甘發散之過歟局方以沉檀腦麝等諸香作湯較之芎辛散之禍孰為輕重請試思之黃連味苦寒無毒主熱氣目痛皆傷淚出明目腹痛止煩渴益膽殺小兒疳蟲點赤眼昏痛鎮肝治驚悸煩躁潤心肺長肉止血並瘡疥盜汗成聊攝云苦入心寒除熱大黃黃連之苦以導瀉心下之虛熱又云上熱者泄之以苦黃連之苦以降陽又云蛔得甘則動得苦則安黃連黃檗之苦以安蛔潔古云瀉心火除脾胃中濕熱治煩躁噁心鬱熱在中焦兀兀欲吐味苦氣味俱厚可升可降陰中陽也其用有五瀉心熱一也去中焦火二也諸瘡必用三也去風濕四也赤眼暴發五也酒炒則上行又云去中焦濕與熱用黃連瀉心火故也眼痛不可忍者用黃連當歸根酒浸煎服宿食不消者用黃連枳實海藏云入手少陰經性苦燥故入心火就燥也雖然瀉心其實瀉脾也為子能令母實實則瀉其子凡治血病防風為上使黃連為中使地榆為下使也一方令小兒終身不發癍瘡煎黃連一口兒初生未出聲時灌之大驗已出聲時灌之者癍雖發亦輕古方以黃連為治痢之最衍義云治痢兒有微血不可執以黃連為苦燥用之虛者必致危困若氣實初病熱多血痢者則宜用之丹溪云以薑汁炒黃連辛散沖熱有功黃耆味甘微溫無毒主癰疽排膿止痛內托補虛逐五臟間惡血補丈夫虛損主虛喘助氣壯筋骨長肉補血產前後一切病月候不勻消渴骨蒸潔古云治虛勞自汗補肺氣實皮毛瀉肺中火脈弦自汗善治脾胃虛弱瘡瘍血脈不行內托陰證瘡瘍必用之藥也主治秘訣云性溫味甘氣薄味厚可升可降陰中陽也其用有五補諸虛不足一也益元氣二也去肌熱三也瘡瘍排膿止痛四也壯脾胃五也去諸經之痛除虛熱止盜汗東垣云補五臟諸虛不足瀉陰火無汗則發之有汗則止之又云護周身皮毛間腠理虛及活血脈生血乃瘡家聖藥也又能補表之元氣虛弱通和陽氣泄火邪也海藏云黃耆有白水耆木耆功用皆同惟木耆莖短而理橫折之如綿皮黃褐色肉內白色謂之綿黃耆若但堅脆味苦者謂之苜蓿根世人以苜宿根代之呼為土黃耆但味苦能令人瘦特味甘者能令人肥也頗能亂真用者宜審其治氣虛盜汗並自汗即皮表之藥又治皮膚痛則表藥可知又治咯血柔脾胃是又為中州藥也又治傷寒尺脈不至又補腎藏之元氣以為里藥乃是上中下內外三焦之藥也圖經言河東者沁州綿上是也故謂之綿耆味甘如蜜兼體骨柔軟如綿世以為如綿者為綿黃耆非也別說云黃耆本出綿上者為良蓋以地產為綿治以柔韌如綿為綿而偽者亦柔韌但當以堅脆甘苦為別也衍義云黃耆防風世多相須而用東垣云黃耆人參甘草此三味退熱之聖藥也靈樞云衛氣者所以溫分肉而充皮膚肥腠理而司開闔黃耆既補三焦實衛氣與桂同特益氣異爾然亦在乎佐使桂則通血脈亦能破血而實衛氣通內實外者歟桂以通血言則耆為實氣也入手少陽足太陰足少陰命門之劑肉蓯蓉味甘酸溫無毒主勞傷補中除莖中痛強陰益精海藏云命門相火不足以此補之丹溪云屬土而有水與火能峻補精血驟多用之則反滑大腸鎖陽丹溪云味甘可啖煮粥彌佳補陰氣治虛而大便燥結者虛而大便不燥結者勿用可代蓯蓉用防風潔古云療風通用瀉肺實如神散頭目中滯氣除上焦風邪又為去濕藥之使風能勝濕故也誤服瀉人上焦元氣主治秘訣云味甘純陽手足太陽經之本藥又云防風甘辛溫散經絡中留濕東垣云防風辛溫氣味俱薄浮而升陽也凡瘡在胸膈已上雖無手足太陽證亦當用之為能散結去上部風病人身體拘急者風也諸瘡見此證者亦須用之若脊痛項強不可回顧腰似折項似拔者乃手足太陽證正當用之又云防風能制黃耆黃耆得防風其功愈大又云防風盡治一身之痛乃卒伍卑賤之職聽令而行隨所引而至乃風藥中之調劑也雖與黃耆相制乃相畏相使者也又云防風身去人身半已上風邪梢去人身半已下風邪主治諸風丹溪云人之口通乎地鼻通乎天口以養陰鼻以養陽天主清故鼻不受有形而受無形為多地主濁故口受有形而兼乎無形昔王太后病風不能言而脈沉其事急若以有形之湯藥則緩不急事乃造防風黃耆湯數斛置於床下氣如煙霧使口鼻皆受其夕便得語藥力薰蒸其效如此善醫者宜取法焉五味子成聊攝云內經曰肺欲收急食酸以收之芍藥五味子之酸以收逆氣而安肺潔古云五味子大益五臟氣孫真人曰五月常服五味子以補五臟之氣遇季夏之間令人困乏無力無氣以動與黃耆人參麥門冬少加黃檗銼煎湯服之使人精神精氣兩足筋力湧出生用東垣云五味子味酸溫主咳逆上氣明目暖水藏治勞傷羸瘦補不足又云收肺氣補氣不足酸以收逆氣肺寒氣逆則此藥與乾薑同用治之又云性溫味酸氣薄味厚可升可降陰中陽也其用有六收散氣一也止嗽二也補元氣不足三也止瀉痢四也生津液五也止渴六也海藏云仲景八味丸用此述類形象為腎氣丸孫真人云五月常服五味子以益肺金之氣在上則滋源在下則補腎故入手太陰足少陰也丹溪云五味子屬水而有木與金大能收肺氣宜其有補腎之功收肺氣非除熱乎補腎非暖水藏乎食之多致虛熱者蓋收補之驟也衍義何惑之有又云火熱嗽必用之茵陳蒿成聊攝云小熱之氣涼以和之大熱之氣寒以取之茵陳梔子之苦寒以逐胃燥海藏云入足陽明經仲景茵陳梔子大黃湯治濕黃也梔子檗皮湯治燥黃也如苗澇則濕黃苗旱則燥黃濕則瀉之燥則潤之可也此二藥治陽黃也韓祗和李思訓治陰黃茵陳附子湯大抵以茵陳為君主佐以大黃附子各隨寒熱也東垣云茵陳味甘陰中微陽治傷寒發黃沙參海藏云沙參厥陰經本經之藥王不留行潔古云苦甘陽中陰也下乳引導用之利血脈東垣云王不留行主金瘡止血乳癰
