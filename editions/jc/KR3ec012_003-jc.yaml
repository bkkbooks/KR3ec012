body:
  text: 卷三木部桂成聊攝云桂枝能泄奔豚又云辛甘發散為陽桂枝之辛甘以和肌表又云辛以散之下焦畜血散以桂枝辛熱之氣也潔古云補下焦熱火不足治沉寒痼冷及表虛自汗春夏二時為禁藥也主治秘訣云滲泄止渴去榮衛中風寒仲景傷寒論發汗用桂枝者乃桂條非身干也取其輕薄而能發散今又有一種柳桂乃桂枝嫩小枝條也尤宜入治上焦藥用也主治秘訣云桂枝性熱味辛甘氣味俱薄體輕而上行浮而升陽也其用有四去傷寒頭痛開腠理解表去皮膚風濕東垣云肉桂味辛甘大熱純陽溫中利肺氣發散表邪去榮衛中風寒秋冬治下部腹痛非桂不能止之又云桂枝味辛性熱氣味俱輕陽也升也故能上行發散於表收內寒則用牡桂辛熱散經寒引導陽氣若熱以使正氣虛者以辛潤之散寒邪治奔豚又云或問本草言桂能止煩出汗仲景或云復發其汗或云先其時發汗或云當以得汗解或云當發汗更發汗併發汗宜桂枝湯凡數處言之則是用桂枝發汗也又云無汗不得服桂枝又云汗家不得重發汗又云發汗過多者用桂枝甘草湯則是用桂枝閉汗也一藥二用如何明得仲景發汗閉汗與本草之義相通為一答曰本草言桂味辛甘大熱無毒能宣導百藥通血脈止煩出汗者是調其血而汗自出也仲景云藏無他病發熱自汗者此是衛氣不和也又云自汗者為榮氣不和榮氣不和則內外不諧蓋衛氣不與榮氣相和諧也若榮氣和則愈矣故用桂枝湯調和榮衛榮衛既和則汗自出風邪由此而解非桂技能開腠理而發汗出也昧者不解閉汗之意凡見傷寒病者便用桂枝湯發汗若與中風自汗者其效應如桴鼓因見其取效而病愈則曰此桂枝發汗出也遂不問傷寒無汗者亦皆與桂枝湯誤之甚矣故仲景言無汗不得服桂枝是閉汗孔也又云發汗多叉手自冒心心下悸欲得按者用桂枝甘草湯此亦是閉汗孔也又云汗家不得重發汗若用桂枝湯是重發其汗也凡桂枝湯下言發字當認作出字是汗自然出也非若麻黃能開腠理而發出汗也本草出二字下文有通血脈一句此非三焦衛氣皮毛中藥此乃榮血中藥也如此則出汗二字當認作榮衛和自然汗出耳非是桂枝開腠理髮出汗也故後人用桂治虛汗讀者當逆察其意可也噫神農作之於前仲景述之於後前聖後聖其揆一也海藏云桂有菌桂牡桂筒桂肉桂板桂桂心官桂之類用者罕有分別大抵細薄者為枝為嫩厚脂者為肉為老但不用粗皮止用其心中者為桂心也衍義云桂大熱素問云辛甘發散為陽故漢張仲景桂枝湯治傷寒表虛皆須用此藥是專用辛甘之意也本草云療寒以熱故知獨有一字桂者本草言甘辛大熱正合素問辛甘發散為陽之說也然本經止言桂而仲景又言桂枝者蓋只取其枝上皮其本身粗厚處不中用今又謂之官桂不知何緣而立名或云官字即觀字之文蓋產於觀州者佳故號觀桂也深慮後世以為別物故於此書之然筒桂厚實氣味重者宜入治藏及下焦藥輕薄者宜入治頭目發散藥故本經以菌桂養精神牡桂利關節仲景傷寒發汗用桂枝桂枝者桂條也非身干也取其輕薄而能發散一種柳桂乃小嫩桂條也尤宜入上焦藥仲景湯液用桂枝發表用肉桂補腎本乎天者親上本乎地者親下理之自然然此藥能護榮氣而實衛氣桂枝發表則在足太陽經桂心入心則在手少陰經丹溪云桂虛能補此大法也仲景救表用桂枝非是表有虛以桂補之也蓋衛有風邪故病自汗以桂枝發其風邪衛和則表密汗自止非桂能收汗而用之也今衍義云乃謂仲景治表虛誤矣本草止言出汗正是內經辛甘發散之意後人用桂止汗失經旨矣名曰官桂者以桂多品取其品之高者可以充貢而名之曰官桂乃貴之辭也桂心者以皮之肉厚去其粗而無味者止留近本一層其味辛甘者故名之曰桂心乃美之之辭也何必致疑若此乎胡椒丹溪云屬火而有金性燥食之快膈喜食者眾大傷脾胃肺氣久則氣大傷凡病氣疾人蓋大其禍也蔓荊實潔古云氣清味辛溫治太陽頭痛頭沉昏悶除目暗散風邪之藥也胃氣人不可服恐傷痰疾主治秘訣云苦甘陽中之陰涼諸經之血熱止頭痛目暗蜀椒潔古云氣溫味辛主邪氣溫中除寒痹堅齒髮明目利五臟凡須用炒去汗及合口者東垣云蜀椒味辛溫大熱純陽溫中明目逐骨節皮膚死肌寒濕痹痛又云蜀椒去汗辛熱以潤心寒丹溪云紅椒屬火而有水與金有下達之能所以其子名曰椒目止行滲道不行穀道能下水燥濕世人服椒者無不被其毒以其久久則火自水中起誰能御之吳茱萸成聊攝云寒淫於內治以甘熱佐以苦辛吳茱萸生薑之辛以溫胃潔古云治寒在咽隘塞胸中經云咽膈不通食不可下食則嘔令人口閉目瞪寒邪所結氣不得上下此病不已令人寒中腹滿膨脹下利寒氣用之如神諸藥不可代也主治秘訣云性熱味辛氣味俱厚氣浮而味降陰中陽也其用有四去胸中滿止心痛治感寒腹痛消宿酒為白豆蔻之佐也東垣云治胸中氣逆不宜多用辛熱恐損元氣入足太陰脾經又云心腹疼痛溫中下氣溫胃去痰冷海藏云吳茱萸入足太陰足厥陰少陰震坤合為其色綠仲景吳茱萸湯當歸四逆湯大溫脾湯及脾胃藥皆用此也衍義云須探湯中浸去苦裂凡六七過始可用此物下氣最速腸虛人服之愈甚益智子潔古云氣熱味辛治脾胃中寒邪和中益氣治人多唾當於補中藥內兼用之不可多服海藏云君相二火手足太陰足少陰本是脾藥在集香丸則入肺在四君子湯則入脾在鳳髓丹則入腎益脾肺腎互用者有子母相關之意厚朴成聊攝云厚朴之苦以泄腹滿又云燥淫於內治以苦溫厚朴之苦以下結燥潔古云能除腹脹若元氣虛弱雖腹脹宜斟酌用之寒脹是也大熱藥中兼用結者散之乃神藥也誤服脫人元氣切禁之主治秘訣云性溫味苦氣味俱厚體重濁而微降陰中陽也平胃氣去腹脹孕婦忌之東垣云厚朴味苦而辛大溫陽中之陰專去腹脹滿去邪氣又云腹脹用薑製厚朴海藏云經言治中風傷寒頭痛溫中益氣消痰下氣厚腸胃去腹脹滿果泄氣乎益氣乎若與枳實大黃同用則能泄實滿經云消痰下氣者是也若與陳皮蒼朮同用則能泄濕滿經云溫中益氣者是也若與解利藥同用則治傷寒頭痛與治痢藥同用則厚腸胃大抵苦溫用苦則泄用溫則補衍義云平胃散中用之最調中至今此藥盛行既能溫脾胃氣又能走冷氣為世所須也加減隨證如五積散治疫同功丹溪云屬土而有火氣藥也溫而能散瀉胃中之實也而平胃散用之佐以蒼朮正為瀉上焦之濕平胃土不使之太過而復其平以致於和而已非謂溫補脾胃也習以成俗皆謂之補哀哉又云厚朴能治腹脹因其味辛以提其氣丁香東垣云丁香味辛溫純陽去脾胃中寒止霍亂又云氣血勝者不可服丁香益其氣也海藏云治翻胃腎氣奔豚氣陰痛壯陽暖腰膝消痃癖除冷勞與五味子廣朮同用亦治奔豚氣泄肺寒補胃大治腎氣入手太陰足陽明少陰丹溪云屬火而有金補瀉能走夫人口居上而地氣出焉肺行清令與脾氣相和惟有潤而甘芳自適焉有所謂口氣病者乎口有氣而已自嫌之以其脾有鬱火溢人肺中失其清和甘美之意而濁氣上干此所謂為口氣病也若以丁香含之揚湯止沸爾惟以香薷煮汁飲之其效甚捷沉香潔古云辛熱純陽補右腎命門東垣云能養諸氣上而至天下而及泉與藥為使最相宜也又云沉香調中補五臟益精壯陽補腎暖腰膝去風水毒腫去惡氣邪氣又云重可去怯以沉香辛溫體重清氣去怯安神檀香潔古云陽中微陰主心腹霍亂中惡引胃氣上升進飲食東垣云能調氣而請香引芳香之物上行至極高之分最宜橙橘之屬佐以薑棗將以葛根豆蔻縮砂益智通行陽明之經在胸膈之上處咽嗌之中同為理氣之藥入手太陰足少陰梔子成無己云苦以湧之梔子之苦以湧虛煩潔古云性寒味苦氣薄味厚輕清上行氣浮而味降陽中陰也其用有四去心經客熱除煩躁去上焦虛熱療風熱是為四也又云梔子氣寒味微苦治心煩懊憹煩不得眠心神顛倒欲絕血滯小便不利又云苦純陽止渴海藏云仲景用梔子治煩胸為高之分也故易老云輕飄而象肺色赤而象火故能瀉肺之火也本草不言吐仲景用此為吐藥梔子本非吐藥為邪氣在上拒而不納故令人上吐邪因得以出經曰高者因而越之此之謂也或用梔子利小便實非利小便清肺也肺氣清而化膀胱為津液之府小便得以出也本經云治大小腸熱辛與庚合又與丙合又能泄戊其先入中州故也去皮泄心火連皮泄肺火入手太陰手少陰經梔子豉湯治煩躁煩者氣也躁者血也氣主肺血主腎故用梔子以治肺煩用香豉以治腎躁煩躁者懊憹不得眠也少陰虛滿者加甘草若嘔噦者加生薑橘皮下後腹滿而煩梔子厚朴枳實湯下後身熱微煩梔子甘草乾薑湯梔子大而長者染色不堪入藥皮薄而圓七稜至九稜者名曰山梔子所謂越桃者是也衍義云仲景治傷寒汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹以梔子豉湯治之因虛故不用大黃有寒毒故也梔子雖寒無毒治胃中熱氣既亡血亡津液臟腑無潤養內生虛熱非此物不可除也又治心經留熱小便赤澀去皮山梔子火炮大黃連翹甘草炙等分末之水煎三二錢七服之無不效張仲景傷寒論及古今名醫治發黃皆用梔子茵陳香豉甘草等分四物作湯飲之又治大病起勞復皆用梔子鼠矢等湯並小利而愈其方極多不可悉載用仁去心胸中熱用皮去肌表間熱丹溪云山梔子屈曲下行降又能治肺中之火也檗皮成聊攝云蛔得甘則動得苦則安黃連黃檗之苦安蛔潔古云治腎水膀胱不足諸痿厥腰腳無力於黃耆湯中少加用之使兩足膝氣力湧出痿軟即時去矣蜜炙此一味為細末治口瘡如神癱瘓必用之藥也主治秘訣云性寒味苦氣味俱厚沉而降陰也其用有六瀉膀胱龍火一也利小便熱結二也除下焦濕腫三也治痢疾先見血四也去臍下痛五也補腎氣不足壯骨髓六也二制則治上焦單制則治中焦不制則治下焦也既能泄瀉膀胱火亦能利竅小便黃用檗皮澀者加澤瀉東垣云黃檗味辛苦苦厚辛微陰中之微降也太陽經引經之藥瀉膀胱經火補本經及腎不足若寒安蛔補下焦虛堅腎經曰苦以堅之凡痿厥除濕藥中不可缺也海藏云足少陰之劑腎苦燥故骨停濕也梔子黃芩入肺黃連入心黃檗入腎燥濕所歸各隨其類也活人解毒湯上下內外通治之丹溪云檗皮屬金而有水與火走手厥陰經而有瀉火補陰之助舌頰瘡多生於郁用之以配細辛治口瘡有奇效地骨皮潔古云氣寒味苦解骨蒸肌熱主消渴風濕痹堅筋骨主治秘訣云屬陰涼血去骨取皮用去肌熱及骨中之熱東垣云地骨皮大寒純陰涼血去皮膚骨節間熱又治表有風寒熱邪自汗又云地骨皮瀉腎火總治熱在外地為陰骨為里皮為表也又云四物湯內加地骨皮牡丹皮治婦人骨蒸最妙又云地骨皮治足少陰手少陽有汗而骨蒸者海藏云入足少陰經手少陽經枳實成聊攝云枳實味苦寒潰堅破積潔古云去胃氣濕熱主治秘訣云氣味升降與枳殼同其用有五主心下痞一化胸脅痰二消宿食三散敗血四破堅積五凡治心下痞及宿食不消並用枳實黃連東垣云枳實味苦微寒苦以泄之治心下痞潔古用治脾經積血故能去心下痞脾無積血則心下不痞散氣消食苦寒炙用以泄氣除內熱海藏云欲益氣則佐之以人參乾薑白朮破氣則佐之以大黃牽牛芒硝此本經所以言益氣而復言消痞也非白朮不能去濕非枳實不能除痞殼主高而實主下高者主氣下者主血主氣者在胸膈主血者在心腹仲景治心下堅大如盤水飲所作枳實白朮湯主之枳實七枚白朮三兩水一斗煎至三升分三服腹中軟即消衍義云枳殼枳實一物也小則其性酷而速大則其性詳而緩故仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之義他方但導散風壅之氣可常服者故用枳殼其意如此故胸中痞有桔梗枳殼湯心下痞有桔實白朮湯高低之分易老詳定為的也丹溪云枳實瀉痰能沖牆倒壁滑竅瀉氣之藥枳殼潔古云治胸中痞塞泄肺氣凡氣刺痛用枳殼看何經分以引經藥導之破滯氣亦用積殼高者用之然能損胸中至高之氣止可二三服而已主治秘訣云性寒味苦氣厚味薄浮升而微降陰中陽也其用有四破心下堅痞一利胸中氣二化痰三消食四然不可多用多則損胸中至高之氣東垣云氣血弱者不可服枳殼以其損氣也豬苓成聊攝云淡味滲泄為陽豬苓茯苓之甘以行小便潔古云大燥除濕比諸淡滲藥大燥亡津液無濕證勿服主治秘訣云性平味淡氣味俱薄升而微降陽也其用與茯苓同去心中懊憹東垣云豬苓味甘苦而淡性平甘重於苦陽也苦以泄滯甘以助陽淡以利竅故能除痹濕而利小便也海藏云治妊娠淋及治妊娠從肺上至腹腫脹小便不利仲景治少陰渴者用豬苓湯入足太陽少陰經衍義行水之功多久服必損腎氣昏人目茯苓成聊攝云茯苓以伐腎邪又云脾惡濕甘先入脾茯苓白朮之甘以益脾逐水又云津液少者甘潤之茯苓白朮之甘緩脾生津潔古云止消渴利小便除濕益燥和中益氣利腰臍間血為主治小便不通溺黃或赤而不利如小便利或數服之則大損人目如汗多人服之損元氣夭人壽醫言赤瀉白補上古無此說主治秘訣云性溫味淡氣味俱薄浮而升陽也其用有五止瀉一利小便二開腠理三除虛熱四生津液五也又云茯苓淡為在天之陽也陽當上行何謂利水而泄下經雲氣之薄者乃陽中之陰所以茯苓利水而泄下亦不離乎陽之體故入手太陽東垣云茯苓味甘而淡性平陽也淡能利竅甘以助陽除濕之聖藥也味甘平補陽益脾逐水平火寒淫所勝小便不利用淡味滲泄為陽也治水緩脾生津液止渴導氣又云分陰陽而導濕海藏云入手足少陰手足太陽也白者入庚辛壬癸色赤者入丙丁伐腎邪小便多則能止之小便澀則能利之與車前子相似雖利小便卻不走氣酒浸與光明硃砂同用能秘真其味甘平如何是利小便丹溪云茯苓屬金得松之餘氣所成仲景利小便多用之此治暴病新病之要藥若久病陰虛者恐未為相宜檳榔潔古云治後重如神性如鐵石之沉重能墜諸藥至於下主治秘訣云性溫味苦氣薄味厚沉而降陰中陽也破滯氣下行泄胸中至高之氣東垣云檳榔辛而苦性溫味厚氣輕陰中陽也苦以泄滯氣辛以散風邪專破滯氣下行槐實潔古云槐實苦酸涼大腸熱槐花亦同東垣云槐實味苦酸鹹寒治口齒風五內邪氣熱止涎唾治大腸熱婦人乳瘕槐花味苦平純陰涼大腸熱去皮膚風腸風瀉血琥珀潔古云屬陽利小便清肺東垣云琥珀味甘平純陽安五臟定魂魄殺精魅消瘀血通五淋利小便丹溪云屬陽金古方利小便以燥脾土有功蓋脾能運化肺自下降故小便可通若因血少不利者用之反致燥急之苦又云能長肌肉烏藥海藏云氣厚於味陽也入足陽明少陰經藿香潔古云性溫味苦氣厚味薄浮而升陽也補腎氣進飲食去枝莖用葉東垣云藿香芳馨之氣特助脾開胃止嘔海藏云溫中快氣治口臭上焦壅煎湯漱口入手足太陰經入勻氣烏藥則補肺入黃耆四君子則補脾乾漆丹溪云漆屬金而有水與火性急能飛補近用為去積滯之藥若用之中節積去後補性內行人不知也皂莢海藏云仲景治咳逆上氣唾濁但坐不得臥皂莢丸主之杆皂莢末一物蜜丸梧子大棗湯下一丸日三夜一活人治陰毒正陽散內皂角引入厥陰經也用之有蜜炙酥炙燒火灰之異宜從本方丹溪云皂角刺治癰疽已潰能引至潰處山茱萸潔古云味酸陽中陰也溫肝藏東垣云山茱萸味酸平微溫陰中之陽主心下邪氣暖腰膝助水藏除一切風逐一切冷海藏云入足少陰厥陰經聖濟經云滑則氣脫澀劑所以收之山茱萸之澀以收其滑仲景八味丸用為君主如何澀劑以通九竅雷公用之去核取肉四兩緩火熬用能壯元氣秘精核滑精故去之側柏葉丹溪云柏屬陰金性善守故採其葉隨月建方以取其多得月令之氣也此補陰之要藥其性多燥久得之大益脾土以滋其肺紫葳花丹溪云凌霄花治血痛之要藥也且補陰甚捷蓋有守而能獨行婦人方中宜用酸棗仁海藏云胡洽治振悸不得眠用人參白朮茯苓甘草生薑酸棗仁炒香六物煮沸本草注治膽虛不眠寒也酸棗仁炒為末竹葉調湯服出聖惠方治膽實多睡熱也酸棗仁生用一錢臘茶二錢薑汁調服出濟眾方桑根白皮海藏云入手太陰經甘厚辛薄甘以固元氣之不足辛以瀉肺氣之有餘訶梨勒東垣云訶梨勒味苦而酸性平味厚陰也苦重酸輕經云肺苦氣上逆急食苦以泄之以酸補之苦重能泄肺氣酸輕不能補肺故嗽藥中不用丹溪云訶子下氣以其味苦而性急喜降經云肺苦急食苦以瀉之謂降而下是也其氣實者宜之若氣虛者似難輕服又云訶子能治肺氣因火傷極遂郁遏脹滿蓋其味酸苦有收斂降火之功故也郁李仁潔古云苦辛陽中之陰主破血潤燥東垣云郁李仁味酸平陰中之陽主大腹水腫面目四肢浮腫治大便氣結燥澀滯不通七聖丸中用之專治氣燥巴豆成無己云巴豆之辛用以散實潔古云性熱味苦氣薄味厚體重而沉降陰也其用有三導氣消積一去臟腑停寒二消化寒涼及生冷硬所傷三也又云巴豆辛陽去胃中寒積東垣云巴豆味辛溫生溫熟寒去胃中寒濕盪滌五臟六腑開通閉塞海藏云斬關奪門之將不可輕用大宜詳審藥性論云得火良若急治為水穀道路之劑則去皮心膜油生用若緩治為消堅磨積之劑則炒煙出令紫黑色用可以通腸可以止泄世所不知也仲景治百病客忤備急丸主之巴豆杏仁例用加減寒熱佐使五色並余例並見醫壘元戎丹溪云去胃中寒積無寒積勿用乳香潔古云辛熱純陽補腎及定諸經之痛東垣云乳香味苦辛熱純陽療風水腫毒去惡風心腹痛若丸散用之微炒殺毒得不黏胡梧淚潔古云味鹹治瘰癧非此不能除東垣云胡梧淚味酸苦大寒主大毒熱心腹煩滿水和服之即吐芫花成聊攝云辛以散之芫花之辛以散飲海藏云仲景治太陽中風脅下痛嘔逆者可攻十棗湯主之胡洽治痰癖飲癖加以大黃甘草大戟甘遂與芫花共五物同煎以相反主之欲其大吐也夫水者肺腎胃三經所主有五臟六腑十二經之部分上而頭目中而四肢下而腰臍外而皮毛中而肌肉內而筋骨脈有尺寸之殊浮沉之異不可輕瀉當知病在何經何藏而用之若誤用則害深矣然而此藥大意泄濕蘇木潔古云性涼味甘酸而微辛陽中之陰發散表裡風氣破死血東垣云味甘而酸辛性平甘勝於酸辛去風與防風同楝實潔古云楝實入心經止下部腹痛又云味酸苦陰中之陽心暴痛者非此不能除樗木皮丹溪云臭椿根皮性涼而能澀血棠球子丹溪云棠球子消食積行結氣建胃催瘡疹治婦人兒枕痛濃煎此藥汁入砂糖調服立效松節丹溪云松屬陽金用其節炒焦治筋骨間病能燥血中之濕松花多食能發上焦熱病五倍子丹溪云五倍子屬金與水噙口中善收頑痰有功且解諸熱毒楓香脂丹溪云楓香屬金而有水與火性疏通故木易有蟲穴其液名白膠香為外科家要藥近世不知誤以為松脂之明瑩者甚失本經之意桑上寄生丹溪云桑寄生藥之要品也自圖經以下失之而俗醫又不識其的惜哉以其生於近海州邑及海外其地暖不蠶由是桑木得氣之厚生意濃郁而無採捋之苦但桑上自然生出且所生處皆是光澤皮膚之上何曾所謂節間可容他樹子耶此說得之海南北道憲僉老的公云合歡丹溪云合歡屬土而有水與金補陰之有捷功者長肌肉續筋骨既可見矣而外科家曾錄用何歟龍腦東垣云龍腦入腎治骨病丹溪云龍腦屬火世知其寒而通利然未達其暖而輕浮飛揚局方但喜其香而貴細故動輒與麝香同用而為桂附之佐殊不知人身之陽易於動陰易於虧幸試思之墨丹溪云墨屬金而有火與水入藥甚助補性杉材丹溪云杉屬陽金而有火用節作湯浸洗以治腳氣腫痛言用屑者非也烏臼木丹溪云烏臼解蛇毒有功淡竹葉竹瀝潔古云竹葉苦陰中微陽涼心經東垣云竹葉辛平除熱緩脾而益元氣丹溪云竹瀝本草言大寒泛觀其意以與石膏黃芩黃連等同類而諸方治胎前產後諸病及金瘡口噤與血虛自汗消渴尿多皆是陰虛之病無不用之產後不得虛胎前不損子夫何世俗因大寒二字棄而不用縮手殆盡豈不哀哉內經云陰虛則發熱大寒而能補正與病對薯蕷寒而能補世或用之惟竹瀝因大寒而置疑是猶因盜嫂受金而棄陳平之國士也殊不知竹瀝味苦性緩能降陰虛之有大熱者大寒言其功也非以氣言也幸相與評其可否若曰不然世人食筍自幼至老何無一人因筍之大寒而病瀝即䇹之液也況假於火而成者何寒如此之甚又云竹瀝滑痰非佐以薑汁不行經絡痰在四肢非竹瀝不可開痰在皮裡膜外非竹瀝薑汁不可除痰在膈間使人顛狂宜用竹瀝風痰亦宜用其功又能養血茗潔古云茶苦為陰中之陽所以清頭目海藏云清頭目利小便消熱渴下氣消食令人少睡中風昏憒多睡不醒宜用此入手足厥陰經治陰證湯藥內用此與去格拒之寒及治伏陽大意相似茗味苦經云苦以泄之其體下行如何是清頭目金櫻子丹溪云金櫻子屬土而有金與水夫經絡隧道以通暢為和平昧者不知取澀性以為快遂熬為煎食之自不作靖咎將誰執茯神東垣云味甘平純陽療風眩心虛闢不止驚悸開心益智安魂魄養精神心虛非此不能除之秦皮東垣云苦寒主熱利下重下焦虛經云腎欲堅急食苦以堅之故用白頭翁黃連黃檗秦皮之苦劑也杜仲潔古云性溫味辛甘氣味俱薄沉而降陽也其用壯筋骨及足弱無力以行東垣云杜仲能使筋骨相著柏子仁海藏云潤腎之藥也人部人溺成聊攝云內經曰若調寒熱之逆冷熱必行則熱物冷服下隘之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此和人尿豬膽汁鹹苦寒物於白通湯熱劑中要其氣相從則可以去格拒之寒也丹溪云人溺降火最速人中白丹溪云能瀉肝火降陰火須置於風露下經二三年者始可用人中黃丹溪云性涼治溫病日華子有方獸部龍骨成聊攝云澀可去脫龍骨牡蠣之澀以收斂浮越之正氣東垣云龍骨味甘平純陽能固大腸脫又云龍齒安魂海藏云澀可去脫而固氣成聊攝云龍骨牡蠣黃丹皆收斂神氣以鎮驚凡用燒通赤研為粉麝香東垣云麝香入脾治肉病牛黃東垣云牛黃入肝治筋病阿膠成聊攝云陰不足者以甘補之阿膠之甘以補血潔古云性平味淡氣味俱薄浮而升陽也能補肺氣不足甘溫以補血不足慢火炮脆搓細用東垣云喘者用阿膠海藏云入手太陰足少陰足厥陰補虛損極咳唾膿血非阿膠不能補仲景豬苓湯用阿膠滑以利水道活人四物湯加減例妊娠下血者加阿膠白馬脛骨丹溪云白馬胚骨煅過用性甘性寒可代黃芩黃連中氣不足者用之犬丹溪云世俗言犬治虛損之病似指陽虛而議治殊不知人身之虛悉是陰虛若陽果虛其死甚易敏者亦難措手夫病在可治者皆陰虛也羚羊角丹溪云屬木入厥陰經為捷紫雪方中用之近理犀角海藏云治一切瘡腫破血升麻代犀角其說見升麻條下易老治畜血分三部上焦畜血用犀角地黃湯中焦畜血用桃仁承氣湯下焦畜血用抵當丸丸但緩於湯爾三法的當後之用者無以復加丹溪云犀角屬陽性走散比諸角為甚痘瘡後用此以散餘毒俗以為常若無餘毒而血虛者或已燥熱發散者而誤用之禍立至人所不知也豬膚海藏云豬膚豬皮也仲景傷寒論豬膚湯注云豬膚甘寒豬水畜也其氣先入堅少陰客熱是以豬膚解之加白蜜以潤燥除煩白粉以益氣斷痢又云傷寒論白通湯加豬膽汁方注云若調寒熱之逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此加人尿豬膽汁鹹苦寒物白通湯熱劑中要其氣相從則可以去格拒之寒也又與醋相和內穀道中酸苦益陰以潤燥瀉便羊肉東垣云羊肉甘熱能補血之虛羊肉有形之物也能補有形肌肉之氣凡味與羊肉同者皆可以補之故曰補可去弱人參羊肉之屬是也人參補氣羊肉補形也豬肉丹溪云豬肉皆補氣又云世俗以肉為性之物肉無補性惟補陽耳今之虛損者不在於陽而在於陰以肉補陰猶緣木求魚何者肉性熱入胃便發熱熱發便生痰痰生則氣便不降而諸證作矣久病後須用補胃氣胃氣非陰氣不足以自全所以淡味為自養之良方也然食淡味又須安心使內火不起可也虎睛東垣云虎睛定魄禽部雞成聊攝云陰不足者以甘補之雞子黃阿膠之甘以補血海藏云陰不足補之以血若咽有瘡以雞子一枚去黃留白用苦酒傾殼中以半夏入苦酒中取殼置刀環上安火上熬微沸去滓旋旋呷之丹溪云風之為病西北氣寒為風所中誠有之矣東南氣溫而地多濕有風病者非風也皆因濕生痰痰生熱熱生風也經曰亢則害承乃制河間云土極似木數千年得經意者河間一人爾衍義云雞動風者習俗所移也雞屬土而有金與木火性補故助濕中之火病邪得之為有助而病反劇非雞而已凡有血氣與夫魚肉之類皆助病邪者也衍義不暇及爾又云雞屬巽助肝火蟲魚部牡蠣成聊攝云咸以軟之牡蠣之咸以消胸脅之滿又云牡蠣之咸以泄水氣又云牡蠣味鹹寒加之則痞者消硬者軟潔古云能軟痞積燒白搗細用東垣云牡蠣味鹹平主傷寒寒熱溫瘧驚恚怒氣癰瘡鼠瘻女子帶下赤白治泄精軟堅積海藏云治脅下痞滿能去瘰癧一切瘡腫入足少陰經咸為軟堅之積以柴胡引之故去脅下硬以茶引之能消結核以大黃引之能消股間腫以地黃為使能益精收澀止小便本腎經之藥也敗龜板丹溪云屬金而有水陰中陽也大有補陰之功而本草不言惜哉其補陰之力而兼去瘀血續筋骨治勞倦其能補陰者蓋龜乃陰中至陰之物稟北方之氣而生故能補陰治陰血不足止血利治四肢無力酥酒豬脂皆可灸之蛤粉丹溪云蛤粉治疝氣能降能消能軟能燥同香附末薑汁調服以治心痛以蛤蜊殼火煅過研為粉用之不入煎劑文蛤成聊攝云文蛤咸走腎則可以勝水氣海藏云能利水治急疳蝕口鼻數日欲死燒灰臘脂和塗之能墜痰軟堅收澀固濟咸能走腎可以勝水文蛤尖而紫斑者即蛤粉也丹溪云馬刀蚌蛤螄蜆大同而小異屬金而有水木土衍義云其冷而不言其濕多食其肉則發痰以其濕中有火久則氣上升而不降因生痰痰則生熱熱則生風何冷之有鱔魚丹溪云鱔魚善補氣鯽魚丹溪云諸魚皆屬土惟鯽魚屬火故能入陽明而有調胃實腸之功若得之多者亦未嘗不起火也戒之又云諸魚之性無一息之停故能動火鱉丹溪云鱉魚補氣白殭蠶潔古云性微溫味微辛氣味俱薄體輕浮而升陽也去皮膚諸風丹溪云白殭蠶屬火而有土與金木老得金氣僵而不化治喉痹者取其火中清化之氣以從治相火散濁逆結滯之痰耳蝦蟆丹溪云蝦蟆屬土與水性寒味甘南方多食之本草明言可不患熱病由是病人喜食之本草之意蓋是或炙或於或燒成灰和在藥劑中用之非若世人煮為羹入鹽椒而啜其湯也此物本濕化大能發濕久則濕亦化熱此因土氣厚自然生火衍義謂解勞熱藥之謂也非羹之謂也戒之蛇蛻海藏云去翳膜用之取其義也蟬蛇亦同蚯蚓丹溪云蚯蚓屬土而有水與木性寒大解諸熱毒行濕病水蛭成聊攝云苦走血咸勝血虻蟲水蛭之鹹苦以除畜血海藏云苦走血咸勝血仲景抵當湯用虻蟲水蛭鹹苦以泄畜血也經云有故無殞也雖可用之亦不甚穩莫若四物湯加酒浸大黃各半用之為妙螻蛄丹溪云螻蛄治口瘡甚效虛人戒勿用之以其性急故也五靈脂丹溪云能行血止血果部草豆蔻潔古云治風寒客邪在胃口之上善去脾胃客寒令人心胃痛主治秘訣云純陽益脾胃去寒以麵裹煨熟去面用東垣云胃脘痛用草豆蔻海藏云虛弱不能飲食宜此與木瓜烏梅縮砂益智麴櫱甘草姜也入足太陰足陽明經橘皮潔古云紅橘皮能益氣加青皮減半去滯氣推陳致新若補脾胃不可去白若理胸中滯氣去白主治秘訣云性寒味辛氣薄味厚浮而升陽也其用有三去胸中寒邪破滯氣少用同白朮則益脾胃多用獨用則損脾胃又云益肺利氣有甘草則補脾胃無則瀉脾海藏云治酒毒用葛根陳皮茯苓甘草生薑湯手太陰氣逆上而不下宜以此順之白檀為之使其芳香之氣清奇之味可以奪橙也活人治噦而有寒熱竹茹陳皮乾薑等湯主咳逆其論並見此事難知青皮潔古云青橘皮氣溫味辛主氣滯下食破積結膈氣及小腹痛主治秘訣云性寒味苦氣味俱厚沉而降陰也其用有五足厥陰少陽之分有病則用之一也破堅癖二也散滯氣三也去下焦濕四也治左腎有積氣五也東垣云足厥陰少陽經之引經藥也有滯氣則破滯氣無滯氣則損其氣又云破滯削堅積皆治在下者效引藥至厥陰之分下食入太陰之倉海藏云青皮如橘皮一種青皮小而未成熟者成熟而大者橘也因色紅故名紅皮以藏日久者佳故名陳皮如枳實枳殼一種實則小而青色未花殼則大而黃紫色已花故殼高而治胸膈實低而治心下與陳皮治高青皮治低之意同或曰陳皮青皮有二種枳實枳殼亦有二種杏核仁潔古云除肺中燥治風燥在於胸膈主治秘訣云性溫味甘苦氣薄味厚濁而沉降陰也其用有三潤肺氣消宿食下降氣麵炒去皮尖東垣云杏仁味苦甘性溫散結潤燥散肺中風及熱是以風熱嗽用之海藏云杏仁破氣入手太陰經王朝奉治傷寒氣上逆喘者麻黃湯內加杏仁陳皮若氣不上喘逆者減杏仁陳皮故知其能瀉肺也東垣云杏仁下喘用治氣也桃仁治狂用治血也杏桃仁俱治大便秘亦當以氣血分之晝則難便行陽氣也夜則難便行陰血也大腸雖屬庚為白腸以晝夜言之氣血不得不分也年高虛人大腸燥秘不可過泄者脈浮在氣杏仁陳皮脈沉在血桃仁陳皮所以俱用陳皮者以其手陽明病與手太陰俱為表裡也賁門上主往來魄門下主收閉故王氏言肺與大腸為通道也丹溪云杏仁屬土而有水與火能墜痰下行須細研之其性熱因寒者可用桃核仁成無己云甘以緩之少腹急結緩以桃仁之甘潔古云治大便血結血秘血燥通潤大腸七宣丸中用之專治血結破血以湯退去皮尖研如泥用又云破滯血須用桃仁蘇木東垣云桃仁味苦甘性平苦重於甘陰中陽也苦以去滯血甘以生新血故破凝血者須用之又能去血中之熱又云桃仁性微寒味苦氣薄味厚沉而降陰也其用有四治熱入血室一也去腹中滯血二也皮膚血熱燥癢三也皮膚凝聚之血四也海藏云桃仁破血手足厥陰經藥也衍義云老人虛秘與柏子仁大麻仁松子仁等分同研熔臘和丸如梧子大黃丹湯下張仲景治中焦畜血用之大棗成聊攝云甘者脾之味也大棗之甘益土而勝水又云大棗人參之甘以緩脾又云邪在半表則榮衛爭之辛甘解之薑棗以和榮衛潔古云純陽溫胃東垣云大棗味甘溫氣厚陽也甘以補脾經不足溫以緩陰血又云和陰陽調榮衛生津液海藏云中滿者勿食甘令人中滿故大建中湯心下痞者減飴棗與甘草同例木瓜海藏云益氣停濕和胃滋脾衍義云木瓜得木之正故入筋以鉛霜塗之則失醋味受金之制故也此物入肝故益筋與血病腰腎腳膝無力不可缺也東垣云氣脫則能收氣滯則能和入手足太陰經雷公云調榮衛助穀氣是也烏梅成聊攝云肺主氣肺欲收急食酸以收之烏梅之酸以收陽東垣云烏梅味酸溫收肺氣陽也海藏云鬼遺方治一切瘡肉突出以烏梅燒灰杵末傅上惡肉立盡極效仲景有治吐蛔下利烏梅丸主之蒲萄丹溪云屬土而有水與木火東南食之多病熱西北食之無恙蓋性能下走滲西北氣厚人之稟亦厚也櫻桃丹溪云屬火而有土性大熱而發渴衍義發明其熱能致其小兒之病將不能病壯者與老者歟舊有熱病及嗽者喘者得之病無甚有致死者芡實丹溪云芡屬土而有水經云補中日華子云言補胃衍義乃言不益脾胃恐是當時有食之過量而為病者遂直書之未之思爾乾柿丹溪云柿屬金而有土陰也有收斂之義止血止嗽亦可為助荔枝子丹溪云荔枝子屬土而有金與木多食發熱衍義謂發虛熱蓋小試爾其核屬金性燥熱又云荔枝肉屬陽主散無形質之滯氣故消瘤贅赤腫者用之知之苟不明則錯用之而不應安石榴丹溪云石榴味酸病人須戒之以其性澀滯而汁戀膈成痰蓋榴者留也梨丹溪云梨渴者宜之梨者利也流利下行之謂也食療謂產婦金瘡人忌之蓋血虛也戒之橄欖丹溪云味澀而生甘醉飽後宜之然其性熱食能致上壅解魚毒胡桃丹溪云胡桃屬土而有火性熱本草言甘平是無熱也能脫人眉動風也非熱大腸肺也乳糖丹溪云石蜜甘喜入脾其多之害必生於脾而西北人得之有益東南人得之未有不病者亦氣之厚薄不同耳雖然東南地下多濕宜乎其得之為害也西北地高多燥宜乎其得之為益也又云糖多食能生胃中之火此損齒之因也非土製水乃濕土非火熱也食棗多者齒病齲亦此意也米穀部大麻子成聊攝云內經曰脾欲緩急食甘以緩之麻子杏仁之甘緩脾而潤燥海藏云入足太陰經手陽明經汗多胃熱便難三者皆因燥熱而亡津液故曰脾約約者約束之義經云燥者潤之故仲景以麻子仁潤足太陰之燥及通腸也白麻油丹溪云香油須是炒熟麻乃可取之人食之美且不致疾若又煎煉食之與火無異戒之飴糖成聊攝云內經曰脾欲緩急食甘以緩之膠飴大棗之甘以緩中也海藏云此即濕餳糖也以其色紫如深琥珀色故謂之膠飴色白而枯者即干餳糖也不入藥中滿者不宜用嘔家切忌之為太陰藥仲景謂嘔家不可用建中湯以甘故也丹溪云飴屬土成之於火大發濕中之熱衍義云其動脾風是言其末而遺其本也酒海藏云古人惟以麥造麴釀黍已為辛熱有毒嚴戒如此況今之醞者加以烏頭巴豆薑桂之類大毒大熱之藥以增其氣味益加辛熱之餘烈豈不傷沖和損精神涸榮衛竭天癸夭人壽耶又云能行諸經而不止與附子相同味辛者能散味苦者能下味甘者居下而緩也為導引可以通行一身之表至極高之分若味淡者則利小便而速下也丹溪云本草止言其熱而有毒不言其濕熱濕中發熱近於相火大醉後振寒戰慄者可見矣又云酒性喜升氣必隨之痰鬱於上溺澀於下肺受賊邪金體大燥恣飲寒涼其熱內郁肺氣得熱必大傷耗其始也病淺或嘔吐或自汗或瘡疥或鼻皶或自泄或心脾痛尚可散而出也其久也病深或為消渴為內疽為肺痿為內痔為膨脹為失明為哮喘為勞嗽為癲癇為難名之病倘非具眼未易處治可不謹乎粟米丹溪云粟屬水與土陳者硬而難化惟得漿水則易化粳米成聊攝云粳米之甘以補正氣海藏云粳米與熟雞頭相合作粥食之可以益精強志聰耳明目本草諸家共言益脾胃如何白虎湯用之入肺以胃為陽明之經色為西方之由故入肺也然治陽明之經即有胃也色白味甘寒入手太陰也又云少陰證桃花湯用此甘以補正氣竹葉石膏湯用此甘以益不足小麥丹溪云面熱而麩涼饑年用以代谷須曬麥令燥以少水潤之春去赤皮煮以為飯食之則無面熱之後患神麯潔古云味甘純陽暖益胃氣消食治食不化須用於脾胃藥中少加之海藏云能治小兒腹堅大如盤胸中滿妊娠卒胎動不安或腰痛胎動搶心下血不止火炒以助天五之氣入足陽明經丹溪云神麯性溫入胃麩皮曲性涼入大腸俱消食積紅曲活血消食大麥丹溪云大麥初熟人多炒而食之此等有火能生熱病人不知也大麥蘖潔古云氣溫味鹹補脾胃虛寬腸胃炒黃色搗細取面用之海藏云治產後腹中膨脹不通此藥氣虛人宜服以代戊己腐熱水穀與豆蔻縮砂芍藥木瓜五味子烏梅為之使丹溪云麥蘖行上焦之滯血腹中鳴者用之豉成聊攝云香豉味苦寒助梔子以吐虛煩潔古云苦陰去心中懊憹生用之東垣云豉苦寒純陰醋成聊攝云苦酒之酸以斂咽瘡丹溪云醋酸漿甘以之調和諸藥儘可適口若和魚肉其致疾以漸人所不知酸收也甘滯也人能遠之亦卻疾之一端也菜部瓜蒂海藏云納鼻中出黃水除偏頭痛有神頭因有濕者宜此瓜蒂苦以治胸中寒與白虎同例俱見知母條下與麝香同為使治久不聞香臭仲景鈐方瓜蒂十四枚丁香一枚黍米四十九粒右為末含水搐一字取下丹溪云瓜蒂俗呼為苦丁香性急損胃氣吐藥不為不多胃弱者勿用設有當吐之證以它藥代之可也病後產後尤宜深戒之仲景有云諸亡血虛家不可與瓜蒂冬瓜丹溪云冬瓜性急而走久病與陰虛者忌之衍義以其分散癰疽毒氣有從於走而性急也莧丹溪云本草分六種而馬莧在其數然馬莧自是一種余莧皆人所種者下溫而又入血分且善走紅莧與馬齒莧同服下胎妙臨產時煮食之易產萊菔並子丹溪萊服根屬土而有金與木本草言煮食之大下氣往往見煮食之多者停膈間成溢飲病以其甘多而辛少也其子有推牆倒壁之功蔥莖白成聊攝云腎苦燥急食辛以潤之蔥白之辛以通陽氣海藏云味辛溫以通上下之陽氣也活人書云傷寒頭痛如破連須蔥白湯主之入手太陰經足陽明經韭丹溪云韭屬金而有水與土其性急研取真汁冷飲細細呷之以下膈中瘀血甚效薤海藏云瀉痢下重者下焦氣滯也四逆湯加薤白以瀉氣滯入手陽明經香薷丹溪云大葉香薷治傷暑利小便濃煎汁成膏為丸服之以治水脹效也荊芥潔古云氣溫味辛氣味俱薄浮而升陽也辟邪毒利血脈宣通五臟不足氣能發汗除勞冷搗和醋封腫毒東垣云主清利頭目薄荷潔古云薄荷能發汗通關節解勞乏與薤相宜新病瘥人不可多服令人虛汗不止主治秘訣云性涼味辛氣味俱薄浮而升陽也去高巔及皮膚風熱海藏云上行之藥能引諸藥入榮衛手太陰兼手厥陰藥也東垣云主清利頭目荊芥亦然大蒜丹溪云大蒜屬火性熱喜散善化肉故食肉者喜用之多在暑月其傷氣之禍積久自見化肉之功不足言也有志於養生者宜自思之茄子丹溪云茄屬土故甘而喜降火腑易動者忌之實之裂者燒灰以治乳裂蒂本燒灰以治口瘡皆甘緩火之意
